function addColumn(){
  const id = "k"+Math.random().toString(36).slice(2,9);
  state.columns.unshift({ id, title:"New Column", color: COLORS[Math.floor(state.columns.length)%COLORS.length].value });
  save(); render();
  const board = document.getElementById("board");
  board.scrollLeft = 0;
}
async function deleteColumn(col){
  const inCol = state.cards.filter(c => c.columnId === col.id);
  const live = inCol.filter(c => !c.archived).length;
  const arch = inCol.length - live;
  if(inCol.length && !(await uiConfirm({ title:`Delete “${col.title}”?`, message:`${live} card${live===1?"":"s"} will be removed.` + (arch?` ${arch} archived card${arch===1?"":"s"} stay in the Archive.`:""), okText:"Delete column", danger:true }))) return;
  const colIndex = state.columns.indexOf(col);
  const removed = inCol.filter(c => !c.archived).map(c => JSON.parse(JSON.stringify(c)));
  const colCopy = JSON.parse(JSON.stringify(col));
  // remove only non-archived cards; keep archived ones (they stay in the Archive pod)
  state.cards = state.cards.filter(c => c.columnId !== col.id || c.archived);
  state.columns = state.columns.filter(k => k.id !== col.id);
  save(); render();
  showUndo(`Deleted column “${col.title}”`, () => {
    state.columns.splice(Math.min(colIndex, state.columns.length), 0, colCopy);
    removed.forEach(c => state.cards.push(c));
    save(); render();
  });
}

/* ============================ Context menus ============================ */
const ctx = document.getElementById("ctx");

// Global right-click: show a context-aware app menu instead of Chrome's default.
document.addEventListener("contextmenu", e => {
  // keep the native menu inside text fields so copy/paste still works while typing
  if(e.target.closest('input, textarea, [contenteditable="true"]')) return;
  e.preventDefault();   // suppress Chrome's menu everywhere else
  const linkEl = e.target.closest(".sidelink");
  if(linkEl){ openLinkMenu(e, linkEl.dataset.link); return; }
  const cardEl = e.target.closest(".card");
  if(cardEl && cardEl.dataset.cardId){ openCardMenu(e, cardEl.dataset.cardId); return; }
  const folderEl = e.target.closest(".link-folder");
  if(folderEl){ const gid = folderEl.dataset.group || null; if(gid){ openLinkFolderMenu(e, gid); return; } }
  const colEl = e.target.closest(".column");
  if(colEl){ const col = column(colEl.dataset.colId); if(col){ openColumnMenu(e, col); return; } }
  // empty board / sidebar / header → general menu
  openGeneralMenu(e);
});

function copyText(t){
  const fallback = () => { const ta = document.createElement("textarea"); ta.value = t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); try { document.execCommand("copy"); } catch(_){} ta.remove(); };
  if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(()=>flashToast("Copied"), ()=>{ fallback(); flashToast("Copied"); });
  else { fallback(); flashToast("Copied"); }
}
// General menu for empty areas (board background, header, sidebar).
function openGeneralMenu(e){
  e.preventDefault();
  const col0 = state.columns[0] && state.columns[0].id;
  ctx.innerHTML =
    `<div class="ctx-label">Add to board</div>`+
    `<button data-g="project">📋 New project</button>`+
    `<button data-g="note">📝 New note</button>`+
    `<button data-g="checklist">✓ New checklist</button>`+
    `<button data-g="column">🗂 Add column</button>`;
  showCtx(e);
  ctx.querySelector('[data-g="project"]').onclick = () => { hideCtx(); if(col0) createCardAt("project", col0, null); };
  ctx.querySelector('[data-g="note"]').onclick = () => { hideCtx(); if(col0) createCardAt("note", col0, null); };
  ctx.querySelector('[data-g="checklist"]').onclick = () => { hideCtx(); if(col0) createCardAt("checklist", col0, null); };
  ctx.querySelector('[data-g="column"]').onclick = () => { hideCtx(); addColumn(); };
}

// Right-click menu on a card: quick edit / duplicate / recolour / archive / delete.
function openCardMenu(e, id){

      `<div class="swatch ${!c.color?'sel':''}" style="background:#cbd2da" data-col="" title="None"></div>`+

    `</div>`+
    `<div class="sep"></div>`+
    `<button data-a="archive">🗄 Archive</button>`+

  showCtx(e);
  ctx.querySelector('[data-a="edit"]').onclick = () => { hideCtx(); if(isNote){ const b = document.querySelector(`[data-card-id="${id}"] .note-edit-body`); if(b) b.focus(); } else openCardEditor(id); };
  ctx.querySelector('[data-a="dup"]').onclick = () => { hideCtx(); duplicateCard(id); };

  ctx.querySelectorAll(".swatch").forEach(s => s.onclick = () => { c.color = s.dataset.col || null; save(); render(); hideCtx(); });

  ctx.querySelector('[data-a="add"]').onclick = () => { hideCtx(); createCardAt("project", col.id, null); };
  ctx.querySelector('[data-a="rename"]').onclick = () => { hideCtx(); const inp = document.querySelector(`.column[data-col-id="${col.id}"] .col-title`); inp && inp.focus(); };
  ctx.querySelector('[data-a="compact"]').onclick = () => { col.compact = !col.compact; save(); render(); hideCtx(); };
  ctx.querySelector('[data-a="collapse"]').onclick = () => { col.collapsed = !col.collapsed; save(); render(); hideCtx(); };
  ctx.querySelector('[data-a="delete"]').onclick = () => { hideCtx(); deleteColumn(col); };
  ctx.querySelector('[data-a="left"]').onclick = () => { hideCtx(); moveColumn(col, -1); };
  ctx.querySelector('[data-a="right"]').onclick = () => { hideCtx(); moveColumn(col, 1); };
}
function moveColumn(col, dir){
  const i = state.columns.findIndex(k=>k.id===col.id);
  const j = i + dir;
  if(j<0 || j>=state.columns.length) return;
  state.columns.splice(j,0,state.columns.splice(i,1)[0]);
  save(); render();
}
function openColorMenu(e, current, cb){
  e.stopPropagation();
  ctx.innerHTML = `<div class="swatches">${COLORS.map(cl=>`<div class="swatch ${current===cl.value?'sel':''}" style="background:${cl.value}" data-col="${cl.value}" title="${cl.name}"></div>`).join("")}</div>`;
  showCtx(e);

function showCtx(e){
  ctx.classList.add("show");
  const w = ctx.offsetWidth, h = ctx.offsetHeight;
  let x = e.clientX, y = e.clientY;
  if(x + w > innerWidth) x = innerWidth - w - 8;
  if(y + h > innerHeight) y = innerHeight - h - 8;
  ctx.style.left = x + "px"; ctx.style.top = y + "px";
}
function hideCtx(){ ctx.classList.remove("show"); }
document.addEventListener("click", e => { if(!ctx.contains(e.target)) hideCtx(); });

function renderEditorItems(c){

  ).join("") || `<div class="hint">No items yet.</div>`;

  wrap.querySelectorAll("[data-down]").forEach(b => b.onclick = () => moveChecklistItem(c, b.dataset.down, 1));

// Move a checklist item up/down within its card (used by the editor's ↑/↓).
function moveChecklistItem(c, itemId, dir){
  const items = c.items || [];
  const i = items.findIndex(x => x.id === itemId);
  const j = i + dir;
  if(i < 0 || j < 0 || j >= items.length) return;
  [items[i], items[j]] = [items[j], items[i]];
  save(); render();
  if(currentModal === "editor" && editingId === c.id) renderEditorItems(c);
}
function getChkAfter(list, y){
  const els = [...list.querySelectorAll(".chk-item:not(.chk-dragging)")];
  let closest = { offset: -Infinity, el: null };
  for(const child of els){
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.offset) closest = { offset, el: child };
  }
  return closest.el;
}
// Read the drag-reordered checklist items back into the card.
function commitChecklistOrder(c){
  const list = document.querySelector(`[data-card-id="${c.id}"] .chk-list`); if(!list) return;
  const ids = [...list.querySelectorAll(".chk-item")].map(el => el.dataset.item);

function renderEditorLogs(c){

  wrap.innerHTML = c.logs.slice().sort((a,b)=>b.end-a.end).map(l=>

function isoDateInput(ts){ const d = new Date(ts); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function endTsForDate(dv){
  if(!dv) return Date.now();
  const [y,m,d] = dv.split("-").map(Number);
  const chosen = new Date(y, m-1, d, 12, 0, 0);
  return sameDay(chosen.getTime(), Date.now()) ? Date.now() : chosen.getTime();
}
function closeModal(){ const wasEditing = editingId; editingId = null; currentModal = null; document.getElementById("overlay").classList.remove("show"); if(wasEditing) render(); }
function inEditable(el){ return !!(el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.tagName === "SELECT" || el.isContentEditable)); }
document.addEventListener("keydown", e => {
  if(e.key === "Escape"){ if(dlgCancelFn){ dlgCancelFn(); return; } closeModal(); hideCtx(); return; }
  if((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "S")){ e.preventDefault(); saveNow(); return; }
  if((e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key === "z" || e.key === "Z")){
    if(inEditable(e.target)) return;   // let a text field do its own undo
    e.preventDefault(); performUndo(); return;
  }
  // single-key shortcuts — only when not typing and no modal/menu is open
  if(e.ctrlKey || e.metaKey || e.altKey) return;
  if(inEditable(e.target)) return;
  if(document.getElementById("overlay").classList.contains("show")) return;
  const firstCol = state.columns[0] && state.columns[0].id;
  switch(e.key){
    case "/": e.preventDefault(); { const s = document.getElementById("searchBox"); if(s){ s.focus(); s.select(); } } break;
    case "n": case "N": if(firstCol) createCardAt("note", firstCol, null); break;
    case "p": case "P": if(firstCol) createCardAt("project", firstCol, null); break;
    case "c": case "C": if(firstCol) createCardAt("checklist", firstCol, null); break;
    case "s": case "S": saveNow(); break;
    case "t": case "T": if(lastTimerId && card(lastTimerId)) toggleCardTimer(lastTimerId); break;
    case "f": case "F": openFocus(); break;
    case "?": openShortcuts(); break;
  }
});

  document.getElementById("overlay").classList.add("show");

/* ============================ Timer tray ============================ */
let trayOpen = false;
let editingTimerId = null;
// Click the time in the tray to edit it: pause the timer, then type a new value.
function editTrayTime(id){
  const t = card(id).timer;
  if(t.st === "running"){ t.elapsed = timerValue(t); t.startedAt = null; t.st = "paused"; }
  editingTimerId = id;
  save(); renderTray();
}
function commitTrayEdit(id, value){
  const c = card(id); if(!c) return;
  c.timer.elapsed = Math.max(0, parseClock(value));
  if(c.timer.st === "stopped") c.timer.st = "paused";
  editingTimerId = null;
  save(); render();
}
function cancelTrayEdit(){ editingTimerId = null; renderTray(); }
function toggleTray(force){ trayOpen = (force===undefined) ? !trayOpen : force; document.getElementById("tray").classList.toggle("show", trayOpen); renderTray(); }
function renderTray(){
  const active = state.cards.filter(c => c.timer.st !== "stopped");
  const pill = document.getElementById("runningPill");
  const running = active.filter(c=>c.timer.st==="running").length;
  if(active.length){ pill.style.display="inline-flex"; document.getElementById("runningPillText").textContent = running + " running" + (active.length>running?` · ${active.length-running} paused`:""); }
  else pill.style.display = "none";

  const body = document.getElementById("trayBody");
  if(!active.length){ body.innerHTML = `<div class="tray-empty">No active timers.<br>Hit ▶ on any card to start one.</div>`; return; }
  body.innerHTML = active.map(c => {
    const t = c.timer;
    const editing = editingTimerId === c.id;
    const timeCell = editing
      ? `<input class="tray-time-input" id="trayedit-${c.id}" value="${fmtClock(timerValue(t))}" spellcheck="false" />`
      : `<span class="tray-time ${t.st}" data-traytime="${c.id}" title="Click to edit the time" onclick="editTrayTime('${c.id}')">${fmtClock(timerValue(t))}</span>`;
    return `<div class="tray-item"${c.color?` style="--card-color:${c.color}"`:''}>`+
      `<div class="ti-title">${esc(c.title)}</div>`+
      `<div class="ti-row">`+
        timeCell+
        `<span style="flex:1"></span>`+
        (editing
          ? `<button class="mini-btn" onclick="commitTrayEdit('${c.id}', document.getElementById('trayedit-${c.id}').value)">Save</button>`
          : (t.st==="running"
              ? `<button class="mini-btn" onclick="pauseTimer('${c.id}')">Pause</button>`
              : `<button class="mini-btn" onclick="resumeTimer('${c.id}')">Resume</button>`)
        )+
        `<button class="mini-btn stop" onclick="confirmStopTimer('${c.id}')">Confirm</button>`+
      `</div></div>`;
  }).join("");
  if(editingTimerId){
    const inp = document.getElementById("trayedit-" + editingTimerId);
    if(inp){
      inp.focus(); inp.select();
      inp.addEventListener("keydown", e => {
        if(e.key === "Enter"){ commitTrayEdit(editingTimerId, inp.value); }
        else if(e.key === "Escape"){ cancelTrayEdit(); }
      });
      inp.addEventListener("blur", () => { if(editingTimerId) commitTrayEdit(editingTimerId, inp.value); });
    }
  }
}

/* ============================ Tick (live update, no re-render) ============================ */
setInterval(() => {
  if(!state) return;   // not booted/logged-in yet
  let anyActive = false;
  state.cards.forEach(c => {
    if(c.timer.st === "stopped") return;
    anyActive = true;
    const live = timerValue(c.timer);
    const badge = document.querySelector(`[data-timebadge="${c.id}"]`);
    if(badge) badge.textContent = "⏱ " + fmtClock(totalSeconds(c));
    const tt = document.querySelector(`[data-traytime="${c.id}"]`);
    if(tt) tt.textContent = fmtClock(live);
  });
  if(anyActive){
    renderTodayPill();
    // keep an open timesheet live if it's showing a period that includes today
    if(currentModal === "timesheet"){
      const showsToday = tsView === "day" ? sameDay(tsAnchor, Date.now())
                                          : (Date.now() >= startOfWeek(tsAnchor) && Date.now() < addDays(startOfWeek(tsAnchor), 7));
      if(showsToday) renderTimesheet();
    }
  }
}, 1000);

/* ============================ Timesheet (daily / weekly) ============================ */
let tsAnchor = startOfDay(Date.now());
let tsView = "day";
function openTimesheet(view){ tsView = view || "day"; tsAnchor = startOfDay(Date.now()); currentModal = "timesheet"; renderTimesheet(); document.getElementById("overlay").classList.add("show"); }
function tsSwitch(v){ tsView = v; renderTimesheet(); }
function tsNav(dir){ tsAnchor = addDays(tsAnchor, dir * (tsView==="week"?7:1)); renderTimesheet(); }
function tsToday(){ tsAnchor = startOfDay(Date.now()); renderTimesheet(); }
function tsGoDay(ts){ tsAnchor = startOfDay(ts); tsView = "day"; renderTimesheet(); }

function progressBar(secs, big){
  const pct = Math.min(100, secs/DAY_TARGET*100);
  const done = secs >= DAY_TARGET;
  const over = secs > DAY_TARGET ? ` <span class="over">+${esc(fmtHuman(secs-DAY_TARGET))} over 🎯</span>` : "";
  if(big){
    return `<div class="ts-bar"><div class="ts-bar-fill ${done?'done':''}" style="width:${pct}%"></div></div>`+
           `<div class="ts-bar-label">${esc(fmtHuman(secs))} / 8h${over}</div>`;
  }
  return `<div class="ts-mini"><span class="${done?'done':''}" style="width:${pct}%"></span></div>`;
}

function renderTimesheet(){
  const modal = document.getElementById("modal");
  const head =
    `<div class="modal-head"><strong>📅 Timesheet</strong>`+
      `<div class="ts-tabs" style="margin-left:14px">`+
        `<button class="ts-tab ${tsView==='day'?'active':''}" onclick="tsSwitch('day')">Day</button>`+
        `<button class="ts-tab ${tsView==='week'?'active':''}" onclick="tsSwitch('week')">Week</button>`+
      `</div>`+
      `<button class="btn ghost x" onclick="closeModal()">✕</button>`+
    `</div>`;

  const nav =
    `<div class="ts-nav">`+
      `<button class="btn" onclick="tsNav(-1)">←</button>`+
      `<span class="lbl">${tsView==='day'?dayLabel(tsAnchor):weekLabel(tsAnchor)}</span>`+
      `<button class="btn" onclick="tsToday()">Today</button>`+
      `<button class="btn" onclick="tsNav(1)">→</button>`+
    `</div>`;

  modal.innerHTML = head +
    `<div class="modal-body">` + nav + (tsView==="day" ? dayViewHtml(tsAnchor) : weekViewHtml(tsAnchor)) + `</div>` +
    `<div class="modal-foot">`+
      `<button class="btn primary" onclick="exportCSV()">⤓ Export all logs (CSV)</button>`+
      `<span style="flex:1"></span>`+
      `<span class="hint" style="margin:0 6px">Clear logs older than</span>`+
      `<button class="btn" onclick="pruneLogs(30)">1 month</button>`+
      `<button class="btn" onclick="pruneLogs(90)">3 months</button>`+
    `</div>`;
}
function dayLabel(ts){
  const isToday = sameDay(ts, Date.now());
  const d = new Date(ts);
  return (isToday?"Today · ":"") + d.toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"});
}
function weekLabel(ts){
  const s = startOfWeek(ts), e = addDays(s,6);
  const f = t => new Date(t).toLocaleDateString(undefined,{day:"numeric",month:"short"});
  const isThis = Date.now()>=s && Date.now()<addDays(s,7);
  return (isThis?"This week · ":"") + f(s) + " – " + f(e);
}
function dayViewHtml(ts){
  const summary = daySummary(ts);
  const total = summary.reduce((s,x)=>s+x.secs,0);
  let rows = summary.map(x =>
    `<div class="ts-row"><span class="dot" style="background:${x.card.color||'#cbd2da'}"></span>`+
      `<span class="nm"><div class="t">${esc(x.card.title)}</div>${x.notes.length?`<div class="n">${esc(x.notes.join(" · "))}</div>`:''}</span>`+
      `<span class="tm">${esc(fmtHuman(x.secs))}</span></div>`
  ).join("");
  if(!rows) rows = `<div class="ts-empty">No time tracked on this day.</div>`;
  return progressBar(total, true) + `<div style="margin-top:12px">` + rows + `</div>`;
}
function weekViewHtml(ts){
  const wkStart = startOfWeek(ts);
  let html = "", weekTotal = 0;
  for(let i=0;i<7;i++){
    const dts = addDays(wkStart, i);
    const summary = daySummary(dts);
    const dt = summary.reduce((s,x)=>s+x.secs,0);
    weekTotal += dt;
    const weekend = i>=5;
    if(weekend && dt===0) continue; // hide empty weekend days
    const isToday = sameDay(dts, Date.now());
    const top = summary.slice(0,4).map(x=>esc(x.card.title)+" ("+fmtHuman(x.secs)+")").join(" · ");
    html +=
      `<div class="ts-day ${isToday?'today':''} ${dt===0?'empty':''}" onclick="tsGoDay(${dts})">`+
        `<div class="ts-day-head"><span class="dname">${DAYNAMES[i]}</span>`+
          `<span class="ddate">${new Date(dts).toLocaleDateString(undefined,{day:"numeric",month:"short"})}</span>`+
          `<span class="dtot">${esc(fmtHuman(dt))}</span></div>`+
        (weekend?"":progressBar(dt,false))+
        (top?`<div class="ts-sub">${top}</div>`:(dt===0?`<div class="ts-sub">—</div>`:""))+
      `</div>`;
  }
  const target = 5*DAY_TARGET;
  html += `<div class="ts-row" style="border:none;margin-top:6px"><span class="nm"><div class="t">Week total</div>`+
          `<div class="n">Mon–Fri target 40h</div></span>`+
          `<span class="tm">${esc(fmtHuman(weekTotal))}</span></div>`;
  return html;
}
async function pruneLogs(days){
  if(!(await uiConfirm({ title:"Clear old time logs?", message:`Delete all time-log entries older than ${days} days?\nThis can't be undone — export first if unsure.`, okText:"Clear", danger:true }))) return;
  const cutoff = startOfDay(addDays(Date.now(), -days));
  let n = 0;
  state.cards.forEach(c => { const before = c.logs.length; c.logs = c.logs.filter(l => l.end >= cutoff); n += before - c.logs.length; });
  save(); renderTimesheet(); render();
  flashToast(`${n} old log entr${n===1?"y":"ies"} cleared`);
}

/* ============================ Focus view (what needs you now) ============================ */
function openFocus(){

  const timerChip = c => `<span class="tm ${c.timer.st === 'running' ? 'running' : 'paused'}">${c.timer.st === 'running' ? '▶ ' : '⏸ '}${esc(fmtClock(timerValue(c.timer)))}</span>`;
  const shootChip = c => { const s = shootInfo(c); return `<span class="shoot-badge ${s.level}">🎬 ${esc(s.days < 0 ? Math.abs(s.days)+'d ago' : (s.days===0?'today':'in '+s.days+'d'))}</span>`; };
  const prioChip = lvl => () => `<span class="prio-badge ${lvl==='critical'?'crit':'high'}">${lvl==='critical'?'🚨 Very urgent':'❗ Urgent'}</span>`;
  const body =

    `<div class="modal-body">`+
      (body || `<div class="ts-empty">Nothing urgent, running, or due soon — you're on top of it. 🎉</div>`)+
    `</div>`+
    `<div class="modal-foot"><span class="hint">Set priority via a card's right-click → Priority.</span></div>`;
  document.getElementById("overlay").classList.add("show");
  modal.querySelectorAll("[data-focus]").forEach(rowEl => rowEl.onclick = () => {
    const c = card(rowEl.dataset.focus); if(!c) return;

    else openCardEditor(c.id);

function exportCSV(){
  const q = s => '"'+String(s==null?"":s).replace(/"/g,'""')+'"';
  const lines = [["Date","Project","Column","Duration (h:mm)","Duration (h)","Note"].join(",")];
  const all = [];
  state.cards.forEach(c => { const col = column(c.columnId); (c.logs||[]).forEach(l => all.push({c,col,l})); });
  all.sort((a,b)=>a.l.end-b.l.end).forEach(({c,col,l}) => {
    lines.push([
      q(isoDateInput(l.end)),
      q(c.title),
      q(col?col.title:""),
      q(fmtClock(l.seconds)),
      (l.seconds/3600).toFixed(2),
      q(l.note||"")
    ].join(","));
  });
  downloadBlob(lines.join("\n"), "time-logs.csv", "text/csv");
}

/* ============================ Import / export ============================ */
function exportData(){ downloadBlob(JSON.stringify(state,null,2), "project-tracker-backup.json", "application/json"); }
function importData(ev){
  const file = ev.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = async () => {
    try {
      const s = JSON.parse(r.result);
      if(!s.columns || !s.cards) throw new Error("Not a valid backup file.");
      if(!(await uiConfirm({ title:"Import backup?", message:"This replaces everything currently in the app. A snapshot of your current board is saved first, so you can undo via Backups.", okText:"Replace & import", danger:true }))) return;
      makeBackup("before-import");
      s.cards.forEach(c => { if(!c.timer) c.timer = newTimer(); if(!c.logs) c.logs=[]; if(!c.links) c.links=[]; if(!c.type) c.type="project"; if(!Array.isArray(c.items)) c.items=[]; });
      state = s; save(); render();
      flashToast("Backup imported");
    } catch(e){ uiAlert({ title:"Import failed", message: e.message }); }
  };
  r.readAsText(file);
  ev.target.value = "";
}
function downloadBlob(content, filename, type){
  const blob = new Blob([content], { type });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

/* ============================ Auto-save to a real file (survives clearing the browser) ============================ */
let fileHandle = null, fileName = "";
const fileSupported = typeof window !== "undefined" && typeof window.showSaveFilePicker === "function";
// tiny IndexedDB key/value to remember the chosen file between sessions
function idbSet(key, val){ return new Promise((res, rej) => { const o = indexedDB.open("ptracker-fs", 1); o.onupgradeneeded = () => o.result.createObjectStore("kv"); o.onsuccess = () => { const db = o.result, tx = db.transaction("kv", "readwrite"); tx.objectStore("kv").put(val, key); tx.oncomplete = () => { db.close(); res(); }; tx.onerror = () => { db.close(); rej(tx.error); }; }; o.onerror = () => rej(o.error); }); }
function idbGet(key){ return new Promise((res, rej) => { const o = indexedDB.open("ptracker-fs", 1); o.onupgradeneeded = () => o.result.createObjectStore("kv"); o.onsuccess = () => { const db = o.result, tx = db.transaction("kv", "readonly"), q = tx.objectStore("kv").get(key); q.onsuccess = () => { res(q.result); db.close(); }; q.onerror = () => { db.close(); rej(q.error); }; }; o.onerror = () => rej(o.error); }); }
// normalise a loaded state object (field defaults; no one-time migrations)
function normalizeState(s){
  if(!s || !Array.isArray(s.cards) || !Array.isArray(s.columns)) return false;
  s.cards.forEach(c => { if(!c.timer) c.timer = newTimer(); if(!c.logs) c.logs = []; if(!c.links) c.links = []; if(c.shootDate===undefined) c.shootDate = null; if(c.status===undefined) c.status = ""; if(!c.type) c.type = "project"; if(!Array.isArray(c.items)) c.items = []; });
  if(!Array.isArray(s.sideLinks)) s.sideLinks = [];
  if(!Array.isArray(s.linkGroups)) s.linkGroups = [];
  s.sideLinks.forEach(l => { if(l.groupId === undefined) l.groupId = null; });
  return true;
}
async function writeStateToFile(){
  if(!fileHandle) return;
  try {
    if((await fileHandle.queryPermission({ mode:"readwrite" })) !== "granted") return;
    const w = await fileHandle.createWritable();
    await w.write(JSON.stringify(state, null, 2));
    await w.close();
    fileSyncStamp();
  } catch(e){ /* transient write error — localStorage still has it */ }
}
let fileStampTimer = null;
function fileSyncStamp(){ const el = document.getElementById("fileStatus"); if(el){ el.dataset.ok = "1"; } }
async function connectDataFile(){
  if(!fileSupported){ uiAlert({ title:"Not available here", message:"This browser can't save straight to a file in this mode. Use 🗂 Data → Download .json regularly, or ask Claude about running it on localhost." }); return; }
  try {
    const h = await window.showSaveFilePicker({ id:"ptracker-data", startIn:"desktop", suggestedName:"project-tracker-data.json", types:[{ description:"Project Tracker data", accept:{ "application/json":[".json"] } }] });
    fileHandle = h; fileName = h.name; await idbSet("handle", h);
    await writeStateToFile();
    hideReconnectBanner();
    flashToast("Auto-saving to " + fileName);
  } catch(e){ /* cancelled */ }
}
async function loadDataFile(){
  if(!fileSupported){ uiAlert({ title:"Not available here", message:"This browser can't open a file in this mode. Use 🗂 Data → Import instead." }); return; }
  try {
    const [h] = await window.showOpenFilePicker({ id:"ptracker-data", startIn:"desktop", types:[{ description:"Project Tracker data", accept:{ "application/json":[".json"] } }] });
    const f = await h.getFile();
    const data = JSON.parse(await f.text());
    if(!normalizeState(data)) throw new Error("That isn't a Project Tracker data file.");
    if(!(await uiConfirm({ title:"Load this file?", message:"Replaces your current board with the file's contents, then keeps auto-saving to it.", okText:"Load" }))) return;
    makeBackup("before-file-load");
    state = data; fileHandle = h; fileName = h.name; await idbSet("handle", h);
    save(); render(); hideReconnectBanner();
    flashToast("Loaded from " + fileName + " — auto-saving");
  } catch(e){ if(e && e.name !== "AbortError") uiAlert({ title:"Couldn't load file", message: e.message }); }
}
async function reconnectDataFile(){
  if(!fileHandle) return;
  try {
    if((await fileHandle.requestPermission({ mode:"readwrite" })) === "granted"){
      await writeStateToFile();   // resume mirroring (current board is what you've been editing)
      hideReconnectBanner();
      flashToast("Reconnected — auto-saving to " + fileName);
    }
  } catch(e){ /* ignore */ }
}
async function initFileSync(){
  if(!fileSupported) return;
  let h; try { h = await idbGet("handle"); } catch(_){ return; }
  if(!h) return;
  fileHandle = h; fileName = h.name || "your data file";
  let perm = "prompt";
  try { perm = await h.queryPermission({ mode:"readwrite" }); } catch(_){}
  if(perm === "granted"){
    try { const f = await h.getFile(); const data = JSON.parse(await f.text()); if(normalizeState(data)){ state = data; save(); render(); } } catch(_){}
  } else {
    showReconnectBanner();
  }
}
function showReconnectBanner(){ const b = document.getElementById("reconnectBanner"); if(b){ b.querySelector(".rb-name").textContent = fileName; b.classList.add("show"); } }
function hideReconnectBanner(){ const b = document.getElementById("reconnectBanner"); if(b) b.classList.remove("show"); }
function fileStatusText(){ return fileHandle ? `Auto-saving to ${fileName}` : "Not connected — changes save in this browser only"; }

/* ============================ Auto-backup (rolling snapshots in localStorage) ============================ */
const SNAP_PREFIX = STORE_KEY + "__snap_";
const SNAP_IDX = STORE_KEY + "__snapidx";
const MAX_SNAPS = 8;
function getSnapIdx(){ try { return JSON.parse(localStorage.getItem(SNAP_IDX)) || []; } catch(e){ return []; } }
// Take a snapshot of the current board into localStorage (skips if unchanged since the last one).
function makeBackup(reason){
  if(!state) return;
  let data;
  try { data = JSON.stringify(state); } catch(e){ return; }
  const idx = getSnapIdx();
  const last = idx[idx.length-1];
  if(last && localStorage.getItem(last.key) === data) return; // nothing changed
  const ts = Date.now();
  const key = SNAP_PREFIX + ts;
  const entry = { ts, key, cards: state.cards.length, reason: reason || "auto" };
  const writeIdx = arr => localStorage.setItem(SNAP_IDX, JSON.stringify(arr));
  for(let attempt = 0; attempt < MAX_SNAPS + 2; attempt++){
    try {
      localStorage.setItem(key, data);
      idx.push(entry);
      while(idx.length > MAX_SNAPS){ const old = idx.shift(); try { localStorage.removeItem(old.key); } catch(_){} }
      writeIdx(idx);
      return;
    } catch(e){
      // quota — drop the oldest snapshot and retry
      if(idx.length){ const old = idx.shift(); try { localStorage.removeItem(old.key); } catch(_){} writeIdx(idx); }
      else return; // can't even fit one — give up quietly
    }
  }
}
async function restoreBackup(key){
  const raw = localStorage.getItem(key); if(!raw){ uiAlert("That backup is no longer available."); return; }
  let s; try { s = JSON.parse(raw); } catch(e){ uiAlert({ title:"Couldn't read backup", message: e.message }); return; }
  if(!(await uiConfirm({ title:"Restore this backup?", message:"Your current board will be replaced. A snapshot of the current board is saved first, so you can undo.", okText:"Restore" }))) return;
  makeBackup("before-restore");
  s.cards.forEach(c => { if(!c.timer) c.timer = newTimer(); if(!c.logs) c.logs=[]; if(!c.links) c.links=[]; if(!c.type) c.type="project"; if(!Array.isArray(c.items)) c.items=[]; });
  state = s; save(); render(); closeModal();
  flashToast("Backup restored");
}
function openBackups(){
  currentModal = "backups";
  // gather rolling snapshots (newest first) + any emergency backups from a failed read
  const snaps = getSnapIdx().slice().reverse();
  const emergency = [];
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf(STORE_KEY + "__backup_") === 0) emergency.push({ ts: +k.split("_").pop() || 0, key: k, reason: "recovered (read error)" });
  }
  const all = snaps.concat(emergency.sort((a,b)=>b.ts-a.ts));
  const fmtWhen = ts => { const d = new Date(ts); return d.toLocaleDateString(undefined,{day:"numeric",month:"short"}) + " " + d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"}); };
  const rows = all.map(e =>
    `<div class="ts-row"><span class="nm"><div class="t">${esc(fmtWhen(e.ts))}</div>`+
      `<div class="n">${e.cards!=null?e.cards+" cards · ":""}${esc(e.reason||"auto")}</div></span>`+
      `<button class="mini-btn" data-restore-key="${esc(e.key)}">Restore</button></div>`).join("");
  const modal = document.getElementById("modal");
  modal.innerHTML =
    `<div class="modal-head"><strong>🕘 Backups</strong><button class="btn ghost x" onclick="closeModal()">✕</button></div>`+
    `<div class="modal-body">`+
      `<div class="hint" style="margin-bottom:10px">The app keeps the last ${MAX_SNAPS} automatic snapshots in this browser (on open + every 15 min) plus your manual ones. Restore any of them, or download a copy to keep off-device.</div>`+
      (all.length ? rows : `<div class="ts-empty">No snapshots yet.</div>`)+
    `</div>`+
    `<div class="modal-foot">`+
      `<button class="btn primary" onclick="makeBackup('manual'); openBackups();">＋ Back up now</button>`+
      `<button class="btn" onclick="exportData()">⤓ Download .json</button>`+
      `<button class="btn" onclick="document.getElementById('importFile').click()">⤒ Import file</button>`+
    `</div>`;
  document.getElementById("overlay").classList.add("show");
  modal.querySelectorAll("[data-restore-key]").forEach(b => b.onclick = () => restoreBackup(b.dataset.restoreKey));
}

function getLinkAfter(box, y){
  const els = [...box.querySelectorAll(".sidelink:not(.dragging)")];
  let closest = { offset: -Infinity, el: null };
  for(const child of els){
    const r = child.getBoundingClientRect();
    const offset = y - r.top - r.height/2;
    if(offset < 0 && offset > closest.offset) closest = { offset, el: child };
  }
  return closest.el;
}
// Read drag-reordered links (and their new folder) back into state.
function commitLinkOrder(){
  const seen = new Set(), newArr = [];
  document.querySelectorAll("#sidebar .link-folder").forEach(fEl => {
    const gid = fEl.dataset.group || null;   // "" -> null (Unsorted)
    fEl.querySelectorAll(".lf-links .sidelink").forEach(row => {
      const l = state.sideLinks.find(x => x.id === row.dataset.link);
      if(l && !seen.has(l.id)){ l.groupId = gid; newArr.push(l); seen.add(l.id); }
    });
  });
  // keep any links not shown in the DOM (e.g. inside collapsed folders) as-is
  state.sideLinks.forEach(l => { if(!seen.has(l.id)) newArr.push(l); });
  state.sideLinks = newArr;
  save(); renderSidebar();
}
function addLinkFolder(){
  const g = { id:"g"+Math.random().toString(36).slice(2,9), name:"New client", collapsed:false };
  (state.linkGroups = state.linkGroups || []).push(g);
  save(); renderSidebar();

async function deleteLinkFolder(gid){
  const g = (state.linkGroups||[]).find(x => x.id === gid); if(!g) return;
  const n = state.sideLinks.filter(l => (l.groupId||null) === gid).length;
  if(n && !(await uiConfirm({ title:`Delete folder “${g.name}”?`, message:`Its ${n} link${n===1?"":"s"} will move to Unsorted.`, okText:"Delete folder", danger:true }))) return;
  state.sideLinks.forEach(l => { if((l.groupId||null) === gid) l.groupId = null; });
  state.linkGroups = state.linkGroups.filter(x => x.id !== gid);
  save(); renderSidebar();
}
function moveLink(id, dir){
  const arr = state.sideLinks;
  const idx = arr.findIndex(l => l.id === id); if(idx < 0) return;
  const gid = arr[idx].groupId || null;
  let j = idx + dir;
  while(j >= 0 && j < arr.length && (arr[j].groupId || null) !== gid) j += dir;  // nearest neighbour in same group
  if(j < 0 || j >= arr.length) return;
  [arr[idx], arr[j]] = [arr[j], arr[idx]];
  save(); renderSidebar();
}
function assignLink(id, gid){
  const arr = state.sideLinks;
  const idx = arr.findIndex(l => l.id === id); if(idx < 0) return;
  const [l] = arr.splice(idx, 1);
  l.groupId = gid || null;
  let lastIdx = -1;
  arr.forEach((x, i) => { if((x.groupId||null) === (gid||null)) lastIdx = i; });
  arr.splice(lastIdx + 1, 0, l);
  save(); renderSidebar();
}

function driveFileId(url){
  const s = String(url);
  const m = s.match(/\/d\/([a-zA-Z0-9_-]{20,})/) || s.match(/[?&]id=([a-zA-Z0-9_-]{20,})/);
  return m ? m[1] : null;

// Friendly label from a URL when the clipboard didn't carry a real title.
function smartLabel(url){
  const id = driveFileId(url);
  if(id && GFILE_TITLES[id]) return GFILE_TITLES[id];   // real Drive title if we know it
  try {
    const u = new URL(url);
    const h = u.hostname.replace(/^www\./, "");
    const p = u.pathname;
    if(h === "docs.google.com"){
      if(p.includes("/spreadsheets/")) return "Google Sheet";
      if(p.includes("/document/")) return "Google Doc";
      if(p.includes("/presentation/")) return "Google Slides";
      if(p.includes("/forms/")) return "Google Form";
      return "Google Docs";
    }
    if(h === "drive.google.com") return "Google Drive file";
    if(h === "sheets.google.com") return "Google Sheet";
    return h;
  } catch(e){ return url; }
}

function normName(s){ return String(s).toLowerCase().replace(/https?:\/\/\S+/g," ").replace(/[^a-z0-9]+/g," ").replace(/\s+/g," ").trim(); }
// Apply the baked induction data onto matching cards (link if missing, shoot date). Idempotent.
function applyInductionData(cards, columns, announce){
  const colTitle = id => (columns.find(k => k.id === id) || {}).title || "";
  let linked = 0, dated = 0;
  INDUCTION_DATA.forEach(d => {
    const en = normName(d.name);

    cards.forEach(c => {
      if(c.archived) return;
      if(normName(c.title).includes(en)){
        const inInd = /induction/i.test(colTitle(c.columnId));
        if(!match || (inInd && !match.inInd)) match = { card:c, inInd };

    });
    if(!match) return;
    const c = match.card;
    if(d.link){ const u = d.link.trim(); if(u && !(c.links||[]).some(l=>l.url===u)){ (c.links=c.links||[]).push({ label:"Induction", url:u }); linked++; } }
    if(d.shootDate && c.shootDate !== d.shootDate){ c.shootDate = d.shootDate; dated++; }
  });
  if(announce){ save(); render(); flashToast(`Induction info applied — ${linked} link${linked===1?"":"s"}, ${dated} date${dated===1?"":"s"}`); }
  return { linked, dated };
}
function loadInductionInfo(){ applyInductionData(state.cards, state.columns, true); }

/* ============================ Board navigation (wheel + drag pan) ============================ */
function setupBoardNav(){
  const board = document.getElementById("board");

  // Vertical wheel scrolls the board horizontally — unless the cursor is over a
  // column that still has room to scroll vertically in that direction.
  board.addEventListener("wheel", e => {
    if(e.ctrlKey) return; // pinch-zoom gesture — leave it alone
    const dom = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
    // genuine horizontal trackpad swipe — let the browser handle it natively
    if(Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
    const list = e.target.closest && e.target.closest(".col-cards");
    if(list && list.scrollHeight > list.clientHeight + 1){
      const atTop = list.scrollTop <= 0;
      const atBottom = list.scrollTop + list.clientHeight >= list.scrollHeight - 1;
      const down = dom > 0;
      if((down && !atBottom) || (!down && !atTop)) return; // let the column scroll
    }
    if(dom === 0) return;
    e.preventDefault();
    board.scrollLeft += dom;
  }, { passive: false });

  // Drag to pan: middle-mouse anywhere, or left-click on the empty board background.
  let pan = null;
  board.addEventListener("mousedown", e => {
    const onBackground = e.target === board;
    if(e.button === 1 || (e.button === 0 && onBackground)){
      pan = { startX: e.clientX, startLeft: board.scrollLeft, moved: false };
      board.classList.add("panning");
      e.preventDefault();
    }
  });
  window.addEventListener("mousemove", e => {
    if(!pan) return;
    const dx = e.clientX - pan.startX;
    if(Math.abs(dx) > 2) pan.moved = true;
    board.scrollLeft = pan.startLeft - dx;
  });
  window.addEventListener("mouseup", () => { if(pan){ pan = null; board.classList.remove("panning"); } });
  // suppress middle-click autoscroll / paste
  board.addEventListener("auxclick", e => { if(e.button === 1) e.preventDefault(); });

  // Column drag-to-reorder (left/right). The dragged column is moved in the DOM as you go.
  board.addEventListener("dragover", e => {
    if(!draggingColEl) return;
    e.preventDefault();
    const after = getColumnAfter(board, e.clientX);
    if(after == null){ board.appendChild(draggingColEl); }
    else if(after !== draggingColEl){ board.insertBefore(draggingColEl, after); }
  });
  board.addEventListener("drop", e => { if(draggingColEl) e.preventDefault(); });
}
let draggingColEl = null;
function wireColumnDrag(handle, colEl){
  handle.setAttribute("draggable", "true");
  handle.addEventListener("dragstart", e => {
    draggingColEl = colEl;
    colEl.classList.add("col-dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", "column"); } catch(_){}
    try { e.dataTransfer.setDragImage(colEl, 24, 16); } catch(_){}
  });
  handle.addEventListener("dragend", () => {
    colEl.classList.remove("col-dragging");
    if(draggingColEl){ draggingColEl = null; commitColumnOrder(); }
  });
}
function getColumnAfter(board, x){
  const els = [...board.querySelectorAll(".column:not(.col-dragging)")];
  let closest = { offset: -Infinity, el: null };
  for(const child of els){
    const box = child.getBoundingClientRect();
    const offset = x - box.left - box.width / 2;
    if(offset < 0 && offset > closest.offset) closest = { offset, el: child };
  }
  return closest.el;
}
function commitColumnOrder(){
  const order = [...document.getElementById("board").querySelectorAll(".column")].map(el => el.dataset.colId);
  state.columns.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
  save(); render();
}

function showLogin(){ document.getElementById("loginScreen").classList.add("show"); }

function updateLoginMode(){
  document.getElementById("loginSub").textContent = signupMode ? "Create your account" : "Sign in to your tracker";
  document.getElementById("loginBtn").textContent = signupMode ? "Create account" : "Sign in";
  document.getElementById("loginToggleText").textContent = signupMode ? "Already have an account?" : "No account yet?";
  document.getElementById("loginToggleLink").textContent = signupMode ? "Sign in" : "Create one";
  document.getElementById("loginPass").setAttribute("autocomplete", signupMode ? "new-password" : "current-password");

function wireLogin(){
  const email = document.getElementById("loginEmail"), pass = document.getElementById("loginPass");
  const errEl = document.getElementById("loginErr"), btn = document.getElementById("loginBtn");
  const submit = async () => {
    errEl.textContent = ""; btn.disabled = true; btn.textContent = "Please wait…";
    const e = email.value.trim(), p = pass.value;
    try {
      if(signupMode){
        const { data, error } = await sb.auth.signUp({ email: e, password: p });

}

  }
}
