/* ============================ Helpers ============================ */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function card(id){ return state.cards.find(c => c.id === id); }
function column(id){ return state.columns.find(k => k.id === id); }
function urgentRank(c){ return c.priority === "critical" ? 0 : c.priority === "high" ? 1 : 9; }  // very-urgent & urgent float to the top; everything else keeps manual order
function cardsIn(colId){ return state.cards.filter(c => c.columnId === colId && (showArchived || !c.archived)).sort((a,b) => urgentRank(a) - urgentRank(b) || a.order - b.order); }
function hostOf(url){ try { return new URL(url).hostname.replace(/^www\./,""); } catch(e){ return url; } }

function timerValue(t){ // live seconds
  let v = t.elapsed || 0;
  if(t.st === "running" && t.startedAt) v += (Date.now() - t.startedAt) / 1000;
  return v;
}
function loggedSeconds(c){ return (c.logs||[]).reduce((s,l)=>s+l.seconds,0); }
function totalSeconds(c){ return loggedSeconds(c) + timerValue(c.timer); }

function fmtClock(sec){
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  const p = n => String(n).padStart(2,"0");
  return (h>0? p(h)+":":"") + p(m) + ":" + p(s);
}
function parseClock(str){
  const parts = String(str).trim().split(":").map(x => parseInt(x,10) || 0);
  if(parts.length >= 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if(parts.length === 2) return parts[0]*60 + parts[1];
  return parts[0] * 60; // a lone number = minutes
}
function fmtHuman(sec){
  sec = Math.floor(sec);
  if(sec < 60) return sec + "s";
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
  if(h>0) return h + "h " + m + "m";
  return m + "m";
}
function fmtDate(ts){ const d = new Date(ts); return d.toLocaleDateString(undefined,{day:"numeric",month:"short"}) + " " + d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"}); }

/* ---- date helpers (daily / weekly timesheet) ---- */
const DAY_TARGET = 8 * 3600; // 8 hours in seconds
function startOfDay(ts){ const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function sameDay(a,b){ return startOfDay(a) === startOfDay(b); }
function addDays(ts,n){ const d = new Date(ts); d.setDate(d.getDate()+n); return d.getTime(); }
function startOfWeek(ts){ const d = new Date(startOfDay(ts)); const dow = (d.getDay()+6)%7; /* Mon=0 */ d.setDate(d.getDate()-dow); return d.getTime(); }
const DAYNAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// Per-project time on a given day. Includes live (running/paused) time if the day is today.
function daySummary(dayTs){
  const live = sameDay(dayTs, Date.now());
  const out = [];
  state.cards.forEach(c => {
    let secs = 0; const notes = [];
    (c.logs||[]).forEach(l => { if(sameDay(l.end, dayTs)){ secs += l.seconds; if(l.note) notes.push(l.note); } });
    if(live && c.timer.st !== "stopped") secs += timerValue(c.timer);
    if(secs > 0) out.push({ card:c, secs, notes });
  });
  return out.sort((a,b)=>b.secs-a.secs);
}
function daySeconds(dayTs){ return daySummary(dayTs).reduce((s,x)=>s+x.secs, 0); }

// Live shoot countdown from a stored "YYYY-MM-DD" shoot date.
function shootInfo(c){
  if(!c.shootDate) return null;
  const p = c.shootDate.split("-").map(Number);
  if(p.length<3 || !p[0]) return null;
  const target = startOfDay(new Date(p[0], p[1]-1, p[2]).getTime());
  const days = Math.round((target - startOfDay(Date.now())) / 86400000);
  const dateLabel = new Date(target).toLocaleDateString(undefined,{day:"numeric",month:"short"});
  let label;
  if(days === 0) label = "Shoot today";
  else if(days === 1) label = "Shoot tomorrow";
  else if(days === -1) label = "Shoot yesterday";
  else if(days > 1) label = `Shoot in ${days} days`;
  else label = `Shoot ${-days} days ago`;
  const level = days < 0 ? "past" : (days <= 3 ? "soon" : (days <= 7 ? "near" : "ok"));
  return { days, label: `${label} (${dateLabel})`, level };
}
// Parse a UK-style date "d/m/yyyy" (or d/m/yy) to "YYYY-MM-DD"; null if unparseable.
function parseUKDate(s){
  if(!s) return null;
  const m = String(s).trim().match(/^(\d{1,2})\s*\/\s*(\d{1,2})\s*\/\s*(\d{2,4})$/);
  if(!m) return null;
  let [_, d, mo, y] = m; d=+d; mo=+mo; y=+y;
  if(y < 100) y += 2000;
  if(mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  return y + "-" + String(mo).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}

/* ============================ Timer ops ============================ */
// Only one timer runs at a time: banking & pausing any other that's currently running.
function pauseOthers(exceptId){
  state.cards.forEach(c => {
    if(c.id !== exceptId && c.timer.st === "running"){
      c.timer.elapsed = timerValue(c.timer); c.timer.startedAt = null; c.timer.st = "paused";
    }
  });
}
let lastTimerId = null;
function startTimer(id){ const t = card(id).timer; if(t.st==="running") return; pauseOthers(id); if(!t.firstStart) t.firstStart = Date.now(); t.st="running"; t.startedAt = Date.now(); lastTimerId = id; save(); render(); }
function pauseTimer(id){ const t = card(id).timer; if(t.st!=="running") return; t.elapsed = timerValue(t); t.startedAt=null; t.st="paused"; save(); render(); }
function resumeTimer(id){ const t = card(id).timer; if(t.st==="running") return; pauseOthers(id); if(!t.firstStart) t.firstStart = Date.now(); t.st="running"; t.startedAt=Date.now(); lastTimerId = id; save(); render(); }
function stopTimer(id){
  const c = card(id), t = c.timer;
  const secs = timerValue(t);
  if(secs >= 1) c.logs.push({ id:"l"+Math.random().toString(36).slice(2,9), seconds: Math.round(secs), start: t.firstStart || Date.now(), end: Date.now(), note: "" });
  c.timer = newTimer();
  save(); render();
}
function stopAllTimers(){
  state.cards.filter(c=>c.timer.st!=="stopped").forEach(c=>stopTimer(c.id));
}
// Confirm before banking a session (so you don't end one by accident).
async function confirmStopTimer(id){
  const c = card(id); if(!c) return;
  const secs = timerValue(c.timer);
  if(await uiConfirm({ title:"Log this time?", message:`Log ${fmtClock(secs)} on “${c.title || "this card"}”?`, okText:"✓ Confirm" })) stopTimer(id);
}
async function confirmStopAll(){
  const n = state.cards.filter(c=>c.timer.st!=="stopped").length;
  if(!n) return;
  if(await uiConfirm({ title:"Log all timers?", message:`Confirm and log all ${n} timer${n===1?"":"s"}?`, okText:"✓ Confirm" })) stopAllTimers();
}
function toggleCardTimer(id, e){
  e && e.stopPropagation();
  const t = card(id).timer;
  if(t.st === "stopped") startTimer(id);
  else if(t.st === "running") pauseTimer(id);
  else resumeTimer(id);
}

// Shared card wiring: drag + double-click-to-open-editor.
function wireCardBase(el, c){
  el.addEventListener("dragstart", e => { el.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
  el.addEventListener("dragend", () => { el.classList.remove("dragging"); el.draggable = true; commitOrder(); });
  el.addEventListener("dblclick", e => {
    if(e.target.isContentEditable || e.target.closest(".card-menu,.play-btn,a,input,button,label")) return;
    openCardEditor(c.id);
  });
}
// Put a card title into edit mode (used by double-click and when creating a new card).
function startTitleEdit(el, t, c){
  t.setAttribute("contenteditable", "true");
  if(el) el.draggable = false;
  t.focus();
  const r = document.createRange(); r.selectNodeContents(t); const s = getSelection(); s.removeAllRanges(); s.addRange(r);
}
// Title edits with a DOUBLE-CLICK; a single click / drag still moves the card.
function wireInlineTitle(el, c){
  const t = el.querySelector(".card-title");
  if(!t) return;
  t.addEventListener("dblclick", e => { e.stopPropagation(); startTitleEdit(el, t, c); });
  t.addEventListener("keydown", e => { if(t.isContentEditable && e.key === "Enter"){ e.preventDefault(); t.blur(); } });
  t.addEventListener("blur", () => {
    if(!t.isContentEditable) return;
    t.removeAttribute("contenteditable");
    el.draggable = true;
    const v = t.innerText.trim();
    if(v !== (c.title || "")){ c.title = v; save(); }
  });
}
function wireCardMenu(el, c){
  const m = el.querySelector(".card-menu");
  if(m) m.addEventListener("click", e => { e.stopPropagation(); openCardMenu(e, c.id); });
  const ed = el.querySelector(".card-edit");
  if(ed) ed.addEventListener("click", e => {
    e.stopPropagation();
    if(c.type === "note"){ const b = el.querySelector(".note-edit-body"); if(b) b.focus(); }
    else openCardEditor(c.id);
  });
}

function renderNoteCard(el, c){
  el.classList.add("note-card");
  el.innerHTML =
    `<div class="card-ctrls"><button class="card-edit" title="Edit">✏️</button><button class="card-menu" title="More options">⋯</button></div>` +
    prioBadgeHtml(c) +
    `<div class="note-edit-title" contenteditable="true" data-ph="Title (optional)" spellcheck="false">${esc(c.title)}</div>` +
    `<div class="note-edit-body" contenteditable="true" data-ph="Write a note…" spellcheck="false">${sanitizeHtml(c.notes)}</div>`;
  wireCardMenu(el, c);
  const titleEl = el.querySelector(".note-edit-title");
  const bodyEl = el.querySelector(".note-edit-body");
  // body keeps rich formatting (Ctrl+B / Ctrl+I work natively in the editable text)
  const saveNote = () => { c.title = titleEl.innerText.trim(); c.notes = bodyEl.innerHTML; save(); };
  [titleEl, bodyEl].forEach(ed => {
    ed.addEventListener("mousedown", () => { el.draggable = false; });
    ed.addEventListener("blur", () => { el.draggable = true; saveNote(); });
    ed.addEventListener("input", saveNote);
    ed.addEventListener("click", e => e.stopPropagation());
  });
  // Enter finishes editing (closes it). Title → done; Body → done, Shift+Enter = new line.
  titleEl.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); titleEl.blur(); } });
  bodyEl.addEventListener("keydown", e => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); bodyEl.blur(); } });
  el.addEventListener("dragstart", e => { el.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
  el.addEventListener("dragend", () => { el.classList.remove("dragging"); el.draggable = true; commitOrder(); });
}

function renderChecklistCard(el, c){
  el.classList.add("checklist-card");
  const items = c.items || [];
  const done = items.filter(i=>i.done).length;
  const itemsHtml = items.map(i =>
    `<div class="chk-item ${i.done?'done':''}" data-item="${i.id}" draggable="true">`+
      `<input type="checkbox" class="chk-cb" data-chk="${i.id}" ${i.done?'checked':''} />`+
      `<span class="chk-txt" data-chk="${i.id}" title="Drag to move · double-click to edit">${sanitizeHtml(i.text)}</span>`+
    `</div>`
  ).join("") || `<div class="chk-empty">No items yet.</div>`;
  el.innerHTML =
    `<div class="card-ctrls"><button class="card-edit" title="Edit">✏️</button><button class="card-menu" title="More options">⋯</button></div>` +
    prioBadgeHtml(c) +
    `<div class="card-topline">`+
      `<div class="card-title" data-ph="Checklist" title="Double-click to rename" spellcheck="false">${esc(c.title)}</div>` +
      `<span class="chk-count">${items.length?done+"/"+items.length:""}</span>` +
    `</div>` +
    (c.archived ? `<span class="archived-tag">archived</span>` : "") +
    `<div class="chk-list">${itemsHtml}</div>` +
    `<div class="chk-add"><input class="chk-add-input" data-chkadd="${c.id}" placeholder="+ add item" spellcheck="false" /></div>`;
  el.querySelectorAll(".chk-cb").forEach(cb => cb.addEventListener("click", e => {
    e.stopPropagation();
    const it = (c.items||[]).find(x=>x.id===cb.dataset.chk); if(it){ it.done = cb.checked; save(); render(); }
  }));
  // DOUBLE-CLICK the text to edit it (single press-and-drag moves it instead)
  el.querySelectorAll(".chk-txt").forEach(sp => {
    const itemEl = sp.closest(".chk-item");
    sp.addEventListener("dblclick", e => {
      e.stopPropagation(); e.preventDefault();
      sp.setAttribute("contenteditable", "true");
      if(itemEl) itemEl.draggable = false;
      sp.focus();
      const r = document.createRange(); r.selectNodeContents(sp); const s = getSelection(); s.removeAllRanges(); s.addRange(r);
    });
    sp.addEventListener("keydown", e => { if(sp.isContentEditable && e.key === "Enter"){ e.preventDefault(); sp.blur(); } });
    sp.addEventListener("blur", () => {
      if(!sp.isContentEditable) return;
      sp.removeAttribute("contenteditable");
      if(itemEl) itemEl.draggable = true;
      const it = (c.items||[]).find(x=>x.id===sp.dataset.chk); if(!it) return;
      const plain = sp.textContent.trim();
      if(!plain){ c.items = (c.items||[]).filter(x=>x.id!==it.id); save(); render(); return; }   // empty → delete
      const html = sanitizeHtml(sp.innerHTML).trim();   // keep bold/italic formatting
      if(html !== it.text){ it.text = html; save(); render(); }
    });
  });
  // Drag items LIVE: the dragged row moves through the lists as you hover (across cards too),
  // committed once on dragend — mirrors the links behaviour, no mid-drag re-render = no flicker.
  const chkList = el.querySelector(".chk-list");
  el.querySelectorAll(".chk-item").forEach(it => {
    it.addEventListener("dragstart", e => { e.stopPropagation(); draggingChk = it.dataset.item; it.classList.add("chk-dragging"); e.dataTransfer.effectAllowed = "move"; });
    it.addEventListener("dragend", e => { e.stopPropagation(); it.classList.remove("chk-dragging"); document.querySelectorAll(".chk-list.chk-over").forEach(l => l.classList.remove("chk-over")); if(draggingChk){ draggingChk = null; commitChkOrder(); } });
  });
  if(chkList){
    chkList.addEventListener("dragover", e => {
      if(!draggingChk) return;
      e.preventDefault(); e.stopPropagation();
      e.dataTransfer.dropEffect = "move";
      chkList.classList.add("chk-over");
      const empty = chkList.querySelector(".chk-empty"); if(empty) empty.style.display = "none";
      const dragging = document.querySelector(".chk-item.chk-dragging"); if(!dragging) return;
      const after = getChkAfter(chkList, e.clientY);
      if(after == null) chkList.appendChild(dragging); else chkList.insertBefore(dragging, after);
    });
    chkList.addEventListener("dragleave", e => { if(!chkList.contains(e.relatedTarget)) chkList.classList.remove("chk-over"); });
    chkList.addEventListener("drop", e => { if(draggingChk){ e.preventDefault(); e.stopPropagation(); chkList.classList.remove("chk-over"); } });
  }
  const addInput = el.querySelector(".chk-add-input");
  addInput.addEventListener("click", e => e.stopPropagation());
  const commitItem = (refocus) => {
    const v = addInput.value.trim(); if(!v) return;
    (c.items = c.items || []).push({ id:"i"+Math.random().toString(36).slice(2,9), text:v, done:false });
    addInput.value = "";
    save(); render();
    if(refocus){ const again = document.querySelector(`.chk-add-input[data-chkadd="${c.id}"]`); if(again) again.focus(); }
  };
  addInput.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); commitItem(true); } });
  addInput.addEventListener("blur", () => commitItem(false));  // clicking away also adds it
}

function getDragAfter(list, y){
  const els = [...list.querySelectorAll(".card:not(.dragging)")];
  let closest = { offset: -Infinity, el: null };
  for(const child of els){
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.offset) closest = { offset, el: child };
  }
  return closest.el;
}

// Read the DOM order back into state after a drag
function commitOrder(){
  document.querySelectorAll(".col-cards").forEach(list => {
    const colId = list.dataset.colId;
    [...list.querySelectorAll(".card")].forEach((el, i) => {
      const c = card(el.dataset.cardId);
      if(c){ c.columnId = colId; c.order = i; }
    });
  });
  save();
  render();   // redraw so each card matches its column (compact only in compact columns, full elsewhere)
}

/* ============================ Card factory / quick add / columns ============================ */
function newCard(type, colId, order, extra){
  const base = { id:"c"+Math.random().toString(36).slice(2,9), type: type||"project", title: "", projectNumber: "",
    notes:"", color:null, links:[], image:null, archived:false, logs:[], timer:newTimer(), shootDate:null, status:"", filePath:"", client:"", renderSpec:"", items:[],
    columnId: colId, order: order||0 };
  return Object.assign(base, extra||{});
}
// Create a card of `type` in a column at a given index (used by palette drag + the add menu).
function createCardAt(type, colId, index){
  const c = newCard(type, colId, 0);
  state.cards.push(c);
  const list = cardsIn(colId).filter(x => x.id !== c.id);
  if(index == null || index < 0 || index > list.length) index = list.length;
  list.splice(index, 0, c);
  list.forEach((x,i) => x.order = i);
  save(); render();
  // No modal — drop the card in and let the user type its name straight away.
  const cardEl = document.querySelector(`[data-card-id="${c.id}"]`);
  if(type === "note"){ const b = cardEl && cardEl.querySelector(".note-edit-body"); if(b) b.focus(); }
  else { const t = cardEl && cardEl.querySelector(".card-title"); if(t) startTitleEdit(cardEl, t, c); }
}

// ---- Drop / paste an image straight onto the board (Milanote-style quick capture) ----
// Shrinks big images so they don't bloat saved data (max ~1100px, JPEG).
function scaleImageToDataURL(blob, maxDim){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
      const scale = Math.min(1, maxDim / Math.max(w, h));
      w = Math.max(1, Math.round(w*scale)); h = Math.max(1, Math.round(h*scale));
      const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
      cv.getContext("2d").drawImage(img, 0, 0, w, h);
      try { resolve(cv.toDataURL("image/jpeg", 0.85)); } catch(e){ reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Couldn't read image")); };
    img.src = url;
  });
}
function addImageCard(dataURL, colId){
  const col = colId || (state.columns[0] && state.columns[0].id);
  if(!col || !dataURL) return;
  const c = newCard("project", col, 0, { image: dataURL });
  state.cards.push(c);
  const others = cardsIn(col).filter(x => x.id !== c.id);
  [c, ...others].forEach((x, i) => x.order = i);   // new image card goes to the top of the column
  save(); render();
  flashToast("🖼 Image added to board");
}
async function addImageFiles(files, colId){
  const imgs = [...files].filter(f => f.type && f.type.indexOf("image/") === 0);
  if(!imgs.length) return;
  for(const f of imgs){ try { const d = await scaleImageToDataURL(f, 1100); addImageCard(d, colId); } catch(e){} }
}
// Paste an image anywhere (but not while typing in a field) → new card.
document.addEventListener("paste", e => {
  if(typeof state === "undefined" || !state) return;
  if(e.target.closest && e.target.closest('input, textarea, [contenteditable="true"]')) return;
  const items = (e.clipboardData && e.clipboardData.items) || [];
  for(const it of items){
    if(it.type && it.type.indexOf("image/") === 0){
      const blob = it.getAsFile();
      if(blob){ e.preventDefault(); scaleImageToDataURL(blob, 1100).then(d => addImageCard(d, state.columns[0] && state.columns[0].id)).catch(()=>{}); return; }
    }
  }
});
// Stop the browser opening a dropped file; route board-area drops to the first column.
document.addEventListener("dragover", e => { if(e.dataTransfer && [...(e.dataTransfer.types||[])].includes("Files")) e.preventDefault(); });
document.addEventListener("drop", e => {
  if(typeof state === "undefined" || !state) return;
  if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length){
    if(!(e.target.closest && e.target.closest(".col-cards"))){   // column drops are handled by the column itself
      e.preventDefault();
      addImageFiles(e.dataTransfer.files, state.columns[0] && state.columns[0].id);
    }
  }
});
// Duplicate a card (fresh copy — no time logs, reset checklist ticks). Great for recurring work.
function duplicateCard(id){
  const c = card(id); if(!c) return;
  const copy = JSON.parse(JSON.stringify(c));
  copy.id = "c"+Math.random().toString(36).slice(2,9);
  copy.title = (c.title || "Untitled") + " (copy)";
  copy.logs = [];
  copy.timer = newTimer();
  copy.archived = false;
  if(Array.isArray(copy.items)) copy.items = copy.items.map(i => ({ id:"i"+Math.random().toString(36).slice(2,9), text:i.text, done:false }));
  state.cards.push(copy);
  // place the copy directly after the original within its column
  const list = cardsIn(c.columnId);
  const at = list.findIndex(x => x.id === c.id);
  list.splice(list.indexOf(copy), 1);
  list.splice(at + 1, 0, copy);
  list.forEach((x,i) => x.order = i);
  save(); render();
  if(copy.type === "note"){ const b = document.querySelector(`[data-card-id="${copy.id}"] .note-edit-body`); if(b) b.focus(); }
  else openCardEditor(copy.id, true);
}

async function deleteColumn(col){
  const inCol = state.cards.filter(c => c.columnId === col.id);
  const live = inCol.filter(c => !c.archived).length;
  const arch = inCol.length - live;
  if(inCol.length && !(await uiConfirm({ title:`Delete “${col.title}”?`, message:`${live} card${live===1?"":"s"} will be removed.` + (arch?` ${arch} archived card${arch===1?"":"s"} stay in the Archive.`:""), okText:"Delete column", danger:true }))) return;
  const colIndex = state.columns.indexOf(col);
  const removed = inCol.filter(c => !c.archived).map(c => JSON.parse(JSON.stringify(c)));
  const colCopy = JSON.parse(JSON.stringify(col));
  // remove only non-archived cards; keep archived ones (they stay in the Archive pod)
  state.cards = state.cards.filter(c => c.columnId !== col.id || c.archived);
  state.columns = state.columns.filter(k => k.id !== col.id);
  save(); render();
  showUndo(`Deleted column “${col.title}”`, () => {
    state.columns.splice(Math.min(colIndex, state.columns.length), 0, colCopy);
    removed.forEach(c => state.cards.push(c));
    save(); render();
  });
}

/* ============================ Context menus ============================ */
const ctx = document.getElementById("ctx");

// Global right-click: show a context-aware app menu instead of Chrome's default.
document.addEventListener("contextmenu", e => {
  // keep the native menu inside text fields so copy/paste still works while typing
  if(e.target.closest('input, textarea, [contenteditable="true"]')) return;
  e.preventDefault();   // suppress Chrome's menu everywhere else
  const linkEl = e.target.closest(".sidelink");
  if(linkEl){ openLinkMenu(e, linkEl.dataset.link); return; }
  const cardEl = e.target.closest(".card");
  if(cardEl && cardEl.dataset.cardId){ openCardMenu(e, cardEl.dataset.cardId); return; }
  const folderEl = e.target.closest(".link-folder");
  if(folderEl){ const gid = folderEl.dataset.group || null; if(gid){ openLinkFolderMenu(e, gid); return; } }
  const colEl = e.target.closest(".column");
  if(colEl){ const col = column(colEl.dataset.colId); if(col){ openColumnMenu(e, col); return; } }
  // empty board / sidebar / header → general menu
  openGeneralMenu(e);
});

function copyText(t){
  const fallback = () => { const ta = document.createElement("textarea"); ta.value = t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); try { document.execCommand("copy"); } catch(_){} ta.remove(); };
  if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(()=>flashToast("Copied"), ()=>{ fallback(); flashToast("Copied"); });
  else { fallback(); flashToast("Copied"); }
}
// General menu for empty areas (board background, header, sidebar).
function openGeneralMenu(e){
  e.preventDefault();
  const col0 = state.columns[0] && state.columns[0].id;
  ctx.innerHTML =
    `<div class="ctx-label">Add to board</div>`+
    `<button data-g="project">📋 New project</button>`+
    `<button data-g="note">📝 New note</button>`+
    `<button data-g="checklist">✓ New checklist</button>`+
    `<button data-g="column">🗂 Add column</button>`;
  showCtx(e);
  ctx.querySelector('[data-g="project"]').onclick = () => { hideCtx(); if(col0) createCardAt("project", col0, null); };
  ctx.querySelector('[data-g="note"]').onclick = () => { hideCtx(); if(col0) createCardAt("note", col0, null); };
  ctx.querySelector('[data-g="checklist"]').onclick = () => { hideCtx(); if(col0) createCardAt("checklist", col0, null); };
  ctx.querySelector('[data-g="column"]').onclick = () => { hideCtx(); addColumn(); };
}
// Right-click menu on a client link folder.

function openColumnMenu(e, col){
  e.stopPropagation();
  ctx.innerHTML =

    `<button data-a="rename">✏️ Rename</button>`+

    `<div class="sep"></div>`+
    `<button data-a="left">← Move left</button>`+
    `<button data-a="right">→ Move right</button>`+

function moveColumn(col, dir){
  const i = state.columns.findIndex(k=>k.id===col.id);
  const j = i + dir;
  if(j<0 || j>=state.columns.length) return;
  state.columns.splice(j,0,state.columns.splice(i,1)[0]);
  save(); render();
}
function openColorMenu(e, current, cb){
  e.stopPropagation();
  ctx.innerHTML = `<div class="swatches">${COLORS.map(cl=>`<div class="swatch ${current===cl.value?'sel':''}" style="background:${cl.value}" data-col="${cl.value}" title="${cl.name}"></div>`).join("")}</div>`;
  showCtx(e);
  ctx.querySelectorAll(".swatch").forEach(s => s.onclick = () => { cb(s.dataset.col); hideCtx(); });

function showCtx(e){
  ctx.classList.add("show");
  const w = ctx.offsetWidth, h = ctx.offsetHeight;
  let x = e.clientX, y = e.clientY;
  if(x + w > innerWidth) x = innerWidth - w - 8;
  if(y + h > innerHeight) y = innerHeight - h - 8;
  ctx.style.left = x + "px"; ctx.style.top = y + "px";
}
function hideCtx(){ ctx.classList.remove("show"); }
document.addEventListener("click", e => { if(!ctx.contains(e.target)) hideCtx(); });

          `<div class="field"><div class="row">`+

            `<div><label>Render / output</label><input class="input" id="f-render" value="${esc(c.renderSpec||"")}" placeholder="e.g. 3840×2160 · MP4 · 30s" /></div>`+
          `</div></div>`+

  });

    if(e.target.value === "__add__"){
      const name = await uiPrompt({ title:"Add a client", label:"Client name", placeholder:"e.g. Northumbrian Water", okText:"Add" });
      if(name && name.trim()){ const s = name.trim(); state.clients = state.clients || []; if(!state.clients.includes(s)) state.clients.push(s); c.client = s; save(); openCardEditor(c.id); render(); }

      inp.value=""; save(); renderEditorItems(c); render();

    document.getElementById("f-item-add").onclick = () => addItem(true);

  if(!isCheck){
    renderEditorLinks(c);

  document.getElementById("f-archive").onclick = () => {
    const wasArchived = c.archived;
    c.archived = !c.archived; save(); closeModal(); render();
    if(!wasArchived) showUndo(`Archived “${c.title || "card"}”`, () => { c.archived = false; save(); render(); });

function renderEditorItems(c){
  const wrap = document.getElementById("f-items");
  if(!wrap) return;
  const items = c.items || [];
  wrap.innerHTML = items.map(i =>
    `<div class="ed-item"><input type="checkbox" data-done="${i.id}" ${i.done?'checked':''} /><input type="text" data-text="${i.id}" value="${esc(i.text)}" /><button class="im-up" data-up="${i.id}" title="Move up">↑</button><button class="im-down" data-down="${i.id}" title="Move down">↓</button><button class="rm" data-rm="${i.id}">✕</button></div>`
  ).join("") || `<div class="hint">No items yet.</div>`;
  wrap.querySelectorAll("[data-done]").forEach(cb => cb.onchange = () => { const it = items.find(x=>x.id===cb.dataset.done); if(it){ it.done = cb.checked; save(); render(); } });
  wrap.querySelectorAll("[data-text]").forEach(tx => tx.oninput = () => { const it = items.find(x=>x.id===tx.dataset.text); if(it){ it.text = tx.value; save(); render(); } });
  wrap.querySelectorAll("[data-up]").forEach(b => b.onclick = () => moveChecklistItem(c, b.dataset.up, -1));
  wrap.querySelectorAll("[data-down]").forEach(b => b.onclick = () => moveChecklistItem(c, b.dataset.down, 1));
  wrap.querySelectorAll("[data-rm]").forEach(b => b.onclick = () => { c.items = items.filter(x=>x.id!==b.dataset.rm); save(); renderEditorItems(c); render(); });
}
// Move a checklist item up/down within its card (used by the editor's ↑/↓).
function moveChecklistItem(c, itemId, dir){
  const items = c.items || [];
  const i = items.findIndex(x => x.id === itemId);
  const j = i + dir;
  if(i < 0 || j < 0 || j >= items.length) return;
  [items[i], items[j]] = [items[j], items[i]];
  save(); render();
  if(currentModal === "editor" && editingId === c.id) renderEditorItems(c);
}
function getChkAfter(list, y){
  const els = [...list.querySelectorAll(".chk-item:not(.chk-dragging)")];
  let closest = { offset: -Infinity, el: null };
  for(const child of els){
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.offset) closest = { offset, el: child };
  }
  return closest.el;
}
// Read the drag-reordered checklist items back into the card.
function commitChecklistOrder(c){
  const list = document.querySelector(`[data-card-id="${c.id}"] .chk-list`); if(!list) return;
  const ids = [...list.querySelectorAll(".chk-item")].map(el => el.dataset.item);
  (c.items || []).sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));
  save(); render();
}
// After a live drag, read each checklist card's DOM order back into its items —
// this captures both reordering and moves BETWEEN checklist cards in one pass.
function commitChkOrder(){
  const pool = new Map();
  state.cards.forEach(c => { if(c.type === "checklist") (c.items || []).forEach(it => pool.set(it.id, it)); });
  const placed = new Set();
  document.querySelectorAll("#board .checklist-card").forEach(cardEl => {
    const c = card(cardEl.dataset.cardId); if(!c) return;
    const items = [];
    cardEl.querySelectorAll(".chk-item").forEach(elx => {
      const it = pool.get(elx.dataset.item);
      if(it && !placed.has(it.id)){ items.push(it); placed.add(it.id); }
    });
    c.items = items;
  });
  save(); render();
}
function renderEditorLinks(c){
  const wrap = document.getElementById("f-links");
  wrap.innerHTML = (c.links||[]).map((l,i)=>`<div class="li"><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label || hostOf(l.url))}</a><button class="rm" data-i="${i}">✕</button></div>`).join("") || `<div class="hint">No links yet.</div>`;

function isoDateInput(ts){ const d = new Date(ts); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function endTsForDate(dv){
  if(!dv) return Date.now();
  const [y,m,d] = dv.split("-").map(Number);
  const chosen = new Date(y, m-1, d, 12, 0, 0);
  return sameDay(chosen.getTime(), Date.now()) ? Date.now() : chosen.getTime();
}
function closeModal(){ const wasEditing = editingId; editingId = null; currentModal = null; document.getElementById("overlay").classList.remove("show"); const m = document.getElementById("modal"); if(m) m.classList.remove("qn-modal"); document.querySelectorAll(".vs-btn").forEach(b => b.classList.toggle("active", b.dataset.view === (typeof currentView !== "undefined" ? currentView : "board"))); if(wasEditing) render(); }
function inEditable(el){ return !!(el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.tagName === "SELECT" || el.isContentEditable)); }
document.addEventListener("keydown", e => {
  if(e.key === "Escape"){ if(dlgCancelFn){ dlgCancelFn(); return; } closeModal(); hideCtx(); return; }
  if((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "S")){ e.preventDefault(); saveNow(); return; }
  if((e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key === "z" || e.key === "Z")){
    if(inEditable(e.target)) return;   // let a text field do its own undo
    e.preventDefault(); performUndo(); return;
  }
  // single-key shortcuts — only when not typing and no modal/menu is open
  if(e.ctrlKey || e.metaKey || e.altKey) return;
  if(inEditable(e.target)) return;
  if(document.getElementById("overlay").classList.contains("show")) return;
  const firstCol = state.columns[0] && state.columns[0].id;
  switch(e.key){
    case "/": e.preventDefault(); { const s = document.getElementById("searchBox"); if(s){ s.focus(); s.select(); } } break;
    case "n": case "N": if(firstCol) createCardAt("note", firstCol, null); break;
    case "p": case "P": if(firstCol) createCardAt("project", firstCol, null); break;
    case "c": case "C": if(firstCol) createCardAt("checklist", firstCol, null); break;
    case "s": case "S": saveNow(); break;
    case "t": case "T": if(lastTimerId && card(lastTimerId)) toggleCardTimer(lastTimerId); break;
    case "f": case "F": openFocus(); break;
    case "?": openShortcuts(); break;
  }
});

function openQuickNotes(){

      `<button class="btn ghost x" onclick="closeModal()">✕</button></div>`+
    `<div class="qn-add">`+
      `<textarea id="qnInput" rows="1" placeholder="Type an idea and press Enter…"></textarea>`+

    `</div>`+
    `<div class="modal-body qn-body" id="qnBody"></div>`+

  const autosize = () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 140) + "px"; };
  const submit = () => { const v = input.value.trim(); if(v){ addQuickNote(v); input.value = ""; autosize(); } input.focus(); };
  document.getElementById("qnAddBtn").onclick = submit;
  input.addEventListener("keydown", e => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); submit(); } });
  input.addEventListener("input", autosize);
  document.getElementById("qnClearDone").onclick = () => {
    const had = qnList().some(n => n.done);
    state.quickNotes = qnList().filter(n => !n.done);

function renderQuickNotes(){
  const body = document.getElementById("qnBody"); if(!body) return;
  const all = qnList();
  const list = all.slice().sort((a,b) => (a.done - b.done) || (b.ts - a.ts));   // open first, newest first
  body.innerHTML = list.length ? list.map(n =>
    `<div class="qn-item ${n.done ? "done" : ""}" data-id="${n.id}">`+
      `<button class="qn-check" data-act="toggle" title="Mark done">${n.done ? "✓" : ""}</button>`+
      `<div class="qn-text" contenteditable="true" spellcheck="true">${esc(n.text)}</div>`+
      `<button class="qn-act qn-del" data-act="del" title="Delete">✕</button>`+
    `</div>`).join("") : `<div class="qn-empty">No quick notes yet.<br>Type above to capture an idea.</div>`;
  const open = all.filter(n => !n.done).length;
  const fc = document.getElementById("qnFootCount");
  if(fc) fc.textContent = all.length ? `${open} open · ${all.length} total` : "";
  body.querySelectorAll(".qn-item").forEach(it => {
    const id = it.dataset.id;
    it.querySelector('[data-act="toggle"]').onclick = () => toggleQuickNote(id);
    it.querySelector('[data-act="del"]').onclick = () => deleteQuickNote(id);

    txt.addEventListener("blur", () => {

}
function addQuickNote(text){ qnList().push({ id: uid(), text, done: false, ts: Date.now() }); save(); renderQuickNotes(); renderSidebar(); }
function toggleQuickNote(id){ const n = qnList().find(x => x.id === id); if(n){ n.done = !n.done; save(); renderQuickNotes(); renderSidebar(); } }
function deleteQuickNote(id){ state.quickNotes = qnList().filter(x => x.id !== id); save(); renderQuickNotes(); renderSidebar(); }

/* ============================ Timer tray ============================ */
let trayOpen = false;
let editingTimerId = null;
// Click the time in the tray to edit it: pause the timer, then type a new value.
function editTrayTime(id){
  const t = card(id).timer;
  if(t.st === "running"){ t.elapsed = timerValue(t); t.startedAt = null; t.st = "paused"; }
  editingTimerId = id;
  save(); renderTray();
}
function commitTrayEdit(id, value){
  const c = card(id); if(!c) return;
  c.timer.elapsed = Math.max(0, parseClock(value));
  if(c.timer.st === "stopped") c.timer.st = "paused";
  editingTimerId = null;
  save(); render();
}
function cancelTrayEdit(){ editingTimerId = null; renderTray(); }
function toggleTray(force){ trayOpen = (force===undefined) ? !trayOpen : force; document.getElementById("tray").classList.toggle("show", trayOpen); renderTray(); }
function renderTray(){
  const pill = document.getElementById("runningPill");
  if(!pill) return;   // time-tracking UI removed — nothing to render
  const active = state.cards.filter(c => c.timer.st !== "stopped");
  const running = active.filter(c=>c.timer.st==="running").length;
  if(active.length){ pill.style.display="inline-flex"; document.getElementById("runningPillText").textContent = running + " running" + (active.length>running?` · ${active.length-running} paused`:""); }
  else pill.style.display = "none";

  const body = document.getElementById("trayBody");
  if(!active.length){ body.innerHTML = `<div class="tray-empty">No active timers.<br>Hit ▶ on any card to start one.</div>`; return; }
  body.innerHTML = active.map(c => {
    const t = c.timer;
    const editing = editingTimerId === c.id;
    const timeCell = editing
      ? `<input class="tray-time-input" id="trayedit-${c.id}" value="${fmtClock(timerValue(t))}" spellcheck="false" />`
      : `<span class="tray-time ${t.st}" data-traytime="${c.id}" title="Click to edit the time" onclick="editTrayTime('${c.id}')">${fmtClock(timerValue(t))}</span>`;
    return `<div class="tray-item"${c.color?` style="--card-color:${c.color}"`:''}>`+
      `<div class="ti-title">${esc(c.title)}</div>`+
      `<div class="ti-row">`+
        timeCell+
        `<span style="flex:1"></span>`+
        (editing
          ? `<button class="mini-btn" onclick="commitTrayEdit('${c.id}', document.getElementById('trayedit-${c.id}').value)">Save</button>`
          : (t.st==="running"
              ? `<button class="mini-btn" onclick="pauseTimer('${c.id}')">Pause</button>`
              : `<button class="mini-btn" onclick="resumeTimer('${c.id}')">Resume</button>`)
        )+
        `<button class="mini-btn stop" onclick="confirmStopTimer('${c.id}')">Confirm</button>`+
      `</div></div>`;
  }).join("");
  if(editingTimerId){
    const inp = document.getElementById("trayedit-" + editingTimerId);
    if(inp){
      inp.focus(); inp.select();
      inp.addEventListener("keydown", e => {
        if(e.key === "Enter"){ commitTrayEdit(editingTimerId, inp.value); }
        else if(e.key === "Escape"){ cancelTrayEdit(); }
      });
      inp.addEventListener("blur", () => { if(editingTimerId) commitTrayEdit(editingTimerId, inp.value); });
    }
  }
}

/* ============================ Tick (live update, no re-render) ============================ */
setInterval(() => {
  if(!state) return;   // not booted/logged-in yet
  let anyActive = false;
  state.cards.forEach(c => {
    if(c.timer.st === "stopped") return;
    anyActive = true;
    const live = timerValue(c.timer);
    const badge = document.querySelector(`[data-timebadge="${c.id}"]`);
    if(badge) badge.textContent = "⏱ " + fmtClock(totalSeconds(c));
    const tt = document.querySelector(`[data-traytime="${c.id}"]`);
    if(tt) tt.textContent = fmtClock(live);
  });
  if(anyActive){
    renderTodayPill();
    // keep the active page live while a timer runs
    if(currentView === "timesheet"){
      const showsToday = tsView === "day" ? sameDay(tsAnchor, Date.now())
                                          : (Date.now() >= startOfWeek(tsAnchor) && Date.now() < addDays(startOfWeek(tsAnchor), 7));
      if(showsToday) renderTimesheet();
    } else if(currentView === "focus"){
      renderFocusPage();
    }
  }
}, 1000);

/* ============================ Timesheet (daily / weekly) ============================ */
let tsAnchor = startOfDay(Date.now());
let tsView = "day";
function openTimesheet(view){ if(view) tsView = view; tsAnchor = startOfDay(Date.now()); setView("timesheet"); }
function tsSwitch(v){ tsView = v; renderTimesheet(); }
function tsNav(dir){ tsAnchor = addDays(tsAnchor, dir * (tsView==="week"?7:1)); renderTimesheet(); }
function tsToday(){ tsAnchor = startOfDay(Date.now()); renderTimesheet(); }
function tsGoDay(ts){ tsAnchor = startOfDay(ts); tsView = "day"; renderTimesheet(); }

function progressBar(secs, big){
  const pct = Math.min(100, secs/DAY_TARGET*100);
  const done = secs >= DAY_TARGET;
  const over = secs > DAY_TARGET ? ` <span class="over">+${esc(fmtHuman(secs-DAY_TARGET))} over 🎯</span>` : "";
  if(big){
    return `<div class="ts-bar"><div class="ts-bar-fill ${done?'done':''}" style="width:${pct}%"></div></div>`+
           `<div class="ts-bar-label">${esc(fmtHuman(secs))} / 8h${over}</div>`;
  }
  return `<div class="ts-mini"><span class="${done?'done':''}" style="width:${pct}%"></span></div>`;
}

function tsPerson(){
  let name = "Me", initials = "MF";
  if(typeof cloudUser !== "undefined" && cloudUser && cloudUser.email){
    const handle = cloudUser.email.split("@")[0];
    name = handle.replace(/[._]+/g, " ").replace(/\b\w/g, m => m.toUpperCase());
  }
  return { name, initials };
}
// Timesheet now renders as a full PAGE (not a modal).
function renderTimesheet(){
  const el = document.getElementById("timesheetPage");
  if(!el) return;
  const head =
    `<div class="page-head">`+
      `<h2>📅 Timesheet</h2>`+
      `<span class="ph-sub">${tsView==='day'?dayLabel(tsAnchor):weekLabel(tsAnchor)}</span>`+
      `<span class="ph-spacer"></span>`+
      `<span class="ph-nav"><button class="btn" onclick="tsNav(-1)">‹ Prev</button>`+
        `<button class="btn" onclick="tsToday()">Today</button>`+
        `<button class="btn" onclick="tsNav(1)">Next ›</button></span>`+
      `<span class="ph-toggle"><button class="${tsView==='day'?'active':''}" onclick="tsSwitch('day')">Day</button>`+
        `<button class="${tsView==='week'?'active':''}" onclick="tsSwitch('week')">Week</button></span>`+
      `<button class="btn ghost" onclick="exportCSV()" title="Export all logs (CSV)">⤓ Export</button>`+
    `</div>`;
  el.innerHTML = head + (tsView==="week" ? tsWeekGridHtml(tsAnchor) : tsDayHtml(tsAnchor));
  el.scrollTop = 0;
}
function tsWeekGridHtml(ts){
  const wkStart = startOfWeek(ts);
  const days = [];
  let weekTotal = 0;
  for(let i=0;i<7;i++){
    const dts = addDays(wkStart, i);
    const summary = daySummary(dts);
    const dt = summary.reduce((s,x)=>s+x.secs,0);
    const weekend = i>=5;
    if(weekend && dt===0) continue;
    weekTotal += dt;
    days.push({ i, dts, summary, dt, weekend });
  }
  const p = tsPerson();
  const target = 5*DAY_TARGET;
  const pct = target ? Math.round(weekTotal/target*100) : 0;
  const person =
    `<div class="tsg-person"><div class="tsg-avatar">${esc(p.initials)}</div>`+
      `<div><div class="tsg-pname">${esc(p.name)}</div><div class="tsg-pmeta">${pct}%</div><div class="tsg-pmeta sub">${esc(fmtHuman(weekTotal))}</div></div></div>`;
  const cols = days.map(d => {
    const isToday = sameDay(d.dts, Date.now());
    const blocks = d.summary.length ? d.summary.map(x =>
      `<div class="tsg-block" style="border-left-color:${x.card.color||'#9aa6b4'}">`+
        `<div class="tsg-b-title">${x.card.projectNumber?`<b>${esc(x.card.projectNumber)}</b> `:""}${esc(x.card.title||"Untitled")}</div>`+
        (x.card.client?`<div class="tsg-b-sub">${esc(x.card.client)}</div>`:"")+
        (x.notes.length?`<div class="tsg-b-note">${esc(x.notes.join(" · "))}</div>`:"")+
        `<div class="tsg-b-time">${esc(fmtHuman(x.secs))}</div>`+
      `</div>`).join("") : `<div class="tsg-empty">—</div>`;
    const diffPill = d.weekend ? "" :
      (d.dt>=DAY_TARGET ? `<span class="tsg-diff over">+${esc(fmtHuman(d.dt-DAY_TARGET))}</span>`
                        : `<span class="tsg-diff under">-${esc(fmtHuman(DAY_TARGET-d.dt))}</span>`);
    return `<div class="tsg-col ${isToday?'today':''}">`+
      `<div class="tsg-colhead"><span class="tsg-dname">${DAYNAMES[d.i]}</span><span class="tsg-ddate">${new Date(d.dts).toLocaleDateString(undefined,{day:"numeric",month:"short"})}</span></div>`+
      `<div class="tsg-blocks" onclick="tsGoDay(${d.dts})" title="Open this day">${blocks}</div>`+
      `<div class="tsg-colfoot"><span class="tsg-dtot">${esc(fmtHuman(d.dt))}</span>${diffPill}</div>`+
    `</div>`;
  }).join("");
  return `<div class="tsg-grid">${person}${cols}</div>`+
    `<div class="tsg-weektot">Week total <b>${esc(fmtHuman(weekTotal))}</b> · Mon–Fri target 40h</div>`;
}
function tsDayHtml(ts){
  const summary = daySummary(ts);
  const total = summary.reduce((s,x)=>s+x.secs,0);
  const rows = summary.length ? summary.map(x =>
    `<div class="tsd-row" style="border-left-color:${x.card.color||'#9aa6b4'}">`+
      `<div class="tsd-main"><div class="tsd-t">${x.card.projectNumber?`<b>${esc(x.card.projectNumber)}</b> `:""}${esc(x.card.title||"Untitled")}</div>`+
        (x.card.client?`<div class="tsd-sub">${esc(x.card.client)}</div>`:"")+
        (x.notes.length?`<div class="tsd-note">${esc(x.notes.join(" · "))}</div>`:"")+`</div>`+
      `<div class="tsd-time">${esc(fmtHuman(x.secs))}</div>`+
    `</div>`).join("") : `<div class="ts-empty">No time tracked on this day.</div>`;
  return `<div class="tsd-wrap">`+progressBar(total, true)+`<div class="tsd-list">`+rows+`</div></div>`;
}
function dayLabel(ts){
  const isToday = sameDay(ts, Date.now());
  const d = new Date(ts);
  return (isToday?"Today · ":"") + d.toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"});
}
function weekLabel(ts){
  const s = startOfWeek(ts), e = addDays(s,6);
  const f = t => new Date(t).toLocaleDateString(undefined,{day:"numeric",month:"short"});
  const isThis = Date.now()>=s && Date.now()<addDays(s,7);
  return (isThis?"This week · ":"") + f(s) + " – " + f(e);
}
function dayViewHtml(ts){
  const summary = daySummary(ts);
  const total = summary.reduce((s,x)=>s+x.secs,0);
  let rows = summary.map(x =>
    `<div class="ts-row"><span class="dot" style="background:${x.card.color||'#cbd2da'}"></span>`+
      `<span class="nm"><div class="t">${esc(x.card.title)}</div>${x.notes.length?`<div class="n">${esc(x.notes.join(" · "))}</div>`:''}</span>`+
      `<span class="tm">${esc(fmtHuman(x.secs))}</span></div>`
  ).join("");
  if(!rows) rows = `<div class="ts-empty">No time tracked on this day.</div>`;
  return progressBar(total, true) + `<div style="margin-top:12px">` + rows + `</div>`;
}
function weekViewHtml(ts){
  const wkStart = startOfWeek(ts);
  let html = "", weekTotal = 0;
  for(let i=0;i<7;i++){
    const dts = addDays(wkStart, i);
    const summary = daySummary(dts);
    const dt = summary.reduce((s,x)=>s+x.secs,0);
    weekTotal += dt;
    const weekend = i>=5;
    if(weekend && dt===0) continue; // hide empty weekend days
    const isToday = sameDay(dts, Date.now());
    const top = summary.slice(0,4).map(x=>esc(x.card.title)+" ("+fmtHuman(x.secs)+")").join(" · ");
    html +=
      `<div class="ts-day ${isToday?'today':''} ${dt===0?'empty':''}" onclick="tsGoDay(${dts})">`+
        `<div class="ts-day-head"><span class="dname">${DAYNAMES[i]}</span>`+
          `<span class="ddate">${new Date(dts).toLocaleDateString(undefined,{day:"numeric",month:"short"})}</span>`+
          `<span class="dtot">${esc(fmtHuman(dt))}</span></div>`+
        (weekend?"":progressBar(dt,false))+
        (top?`<div class="ts-sub">${top}</div>`:(dt===0?`<div class="ts-sub">—</div>`:""))+
      `</div>`;
  }
  const target = 5*DAY_TARGET;

function exportCSV(){
  const q = s => '"'+String(s==null?"":s).replace(/"/g,'""')+'"';

  all.sort((a,b)=>a.l.end-b.l.end).forEach(({c,col,l}) => {

function importData(ev){

      if(!s.columns || !s.cards) throw new Error("Not a valid backup file.");
      if(!(await uiConfirm({ title:"Import backup?", message:"This replaces everything currently in the app. A snapshot of your current board is saved first, so you can undo via Backups.", okText:"Replace & import", danger:true }))) return;

function downloadBlob(content, filename, type){

}

/* ============================ Auto-save to a real file (survives clearing the browser) ============================ */
let fileHandle = null, fileName = "";
const fileSupported = typeof window !== "undefined" && typeof window.showSaveFilePicker === "function";
// tiny IndexedDB key/value to remember the chosen file between sessions
function idbSet(key, val){ return new Promise((res, rej) => { const o = indexedDB.open("ptracker-fs", 1); o.onupgradeneeded = () => o.result.createObjectStore("kv"); o.onsuccess = () => { const db = o.result, tx = db.transaction("kv", "readwrite"); tx.objectStore("kv").put(val, key); tx.oncomplete = () => { db.close(); res(); }; tx.onerror = () => { db.close(); rej(tx.error); }; }; o.onerror = () => rej(o.error); }); }
function idbGet(key){ return new Promise((res, rej) => { const o = indexedDB.open("ptracker-fs", 1); o.onupgradeneeded = () => o.result.createObjectStore("kv"); o.onsuccess = () => { const db = o.result, tx = db.transaction("kv", "readonly"), q = tx.objectStore("kv").get(key); q.onsuccess = () => { res(q.result); db.close(); }; q.onerror = () => { db.close(); rej(q.error); }; }; o.onerror = () => rej(o.error); }); }
// normalise a loaded state object (field defaults; no one-time migrations)
function normalizeState(s){
  if(!s || !Array.isArray(s.cards) || !Array.isArray(s.columns)) return false;
  s.cards.forEach(c => { if(!c.timer) c.timer = newTimer(); if(!c.logs) c.logs = []; if(!c.links) c.links = []; if(c.shootDate===undefined) c.shootDate = null; if(c.status===undefined) c.status = ""; if(!c.type) c.type = "project"; if(!Array.isArray(c.items)) c.items = []; });
  if(!Array.isArray(s.sideLinks)) s.sideLinks = [];
  if(!Array.isArray(s.linkGroups)) s.linkGroups = [];
  s.sideLinks.forEach(l => { if(l.groupId === undefined) l.groupId = null; });
  if(!Array.isArray(s.inductions)) s.inductions = [];
  return true;
}
async function writeStateToFile(){
  if(!fileHandle) return;
  try {
    if((await fileHandle.queryPermission({ mode:"readwrite" })) !== "granted") return;
    const w = await fileHandle.createWritable();
    await w.write(JSON.stringify(state, null, 2));
    await w.close();
    fileSyncStamp();
  } catch(e){ /* transient write error — localStorage still has it */ }
}
let fileStampTimer = null;
function fileSyncStamp(){ const el = document.getElementById("fileStatus"); if(el){ el.dataset.ok = "1"; } }
async function connectDataFile(){
  if(!fileSupported){ uiAlert({ title:"Not available here", message:"This browser can't save straight to a file in this mode. Use 🗂 Data → Download .json regularly, or ask Claude about running it on localhost." }); return; }
  try {
    const h = await window.showSaveFilePicker({ id:"ptracker-data", startIn:"desktop", suggestedName:"project-tracker-data.json", types:[{ description:"Project Tracker data", accept:{ "application/json":[".json"] } }] });
    fileHandle = h; fileName = h.name; await idbSet("handle", h);
    await writeStateToFile();
    hideReconnectBanner();
    flashToast("Auto-saving to " + fileName);
  } catch(e){ /* cancelled */ }
}
async function loadDataFile(){
  if(!fileSupported){ uiAlert({ title:"Not available here", message:"This browser can't open a file in this mode. Use 🗂 Data → Import instead." }); return; }
  try {
    const [h] = await window.showOpenFilePicker({ id:"ptracker-data", startIn:"desktop", types:[{ description:"Project Tracker data", accept:{ "application/json":[".json"] } }] });

    if(!(await uiConfirm({ title:"Load this file?", message:"Replaces your current board with the file's contents, then keeps auto-saving to it.", okText:"Load" }))) return;
    makeBackup("before-file-load");
    state = data; fileHandle = h; fileName = h.name; await idbSet("handle", h);
    save(); render(); hideReconnectBanner();

  } catch(e){ if(e && e.name !== "AbortError") uiAlert({ title:"Couldn't load file", message: e.message }); }
}
async function reconnectDataFile(){
  if(!fileHandle) return;
  try {
    if((await fileHandle.requestPermission({ mode:"readwrite" })) === "granted"){
      await writeStateToFile();   // resume mirroring (current board is what you've been editing)
      hideReconnectBanner();
      flashToast("Reconnected — auto-saving to " + fileName);
    }
  } catch(e){ /* ignore */ }
}
async function initFileSync(){
  if(!fileSupported) return;
  let h; try { h = await idbGet("handle"); } catch(_){ return; }
  if(!h) return;
  fileHandle = h; fileName = h.name || "your data file";
  let perm = "prompt";
  try { perm = await h.queryPermission({ mode:"readwrite" }); } catch(_){}
  if(perm === "granted"){
    try { const f = await h.getFile(); const data = JSON.parse(await f.text()); if(normalizeState(data)){ state = data; save(); render(); } } catch(_){}
  } else {

  }
}

/* ============================ Auto-backup (rolling snapshots in localStorage) ============================ */
const SNAP_PREFIX = STORE_KEY + "__snap_";
const SNAP_IDX = STORE_KEY + "__snapidx";
const MAX_SNAPS = 8;
function getSnapIdx(){ try { return JSON.parse(localStorage.getItem(SNAP_IDX)) || []; } catch(e){ return []; } }
// Take a snapshot of the current board into localStorage (skips if unchanged since the last one).
function makeBackup(reason){
  if(!state) return;
  let data;
  try { data = JSON.stringify(state); } catch(e){ return; }
  const idx = getSnapIdx();
  const last = idx[idx.length-1];
  if(last && localStorage.getItem(last.key) === data) return; // nothing changed
  const ts = Date.now();
  const key = SNAP_PREFIX + ts;
  const entry = { ts, key, cards: state.cards.length, reason: reason || "auto" };
  const writeIdx = arr => localStorage.setItem(SNAP_IDX, JSON.stringify(arr));
  for(let attempt = 0; attempt < MAX_SNAPS + 2; attempt++){
    try {
      localStorage.setItem(key, data);
      idx.push(entry);
      while(idx.length > MAX_SNAPS){ const old = idx.shift(); try { localStorage.removeItem(old.key); } catch(_){} }
      writeIdx(idx);
      return;
    } catch(e){
      // quota — drop the oldest snapshot and retry
      if(idx.length){ const old = idx.shift(); try { localStorage.removeItem(old.key); } catch(_){} writeIdx(idx); }
      else return; // can't even fit one — give up quietly
    }
  }
}
async function restoreBackup(key){
  const raw = localStorage.getItem(key); if(!raw){ uiAlert("That backup is no longer available."); return; }
  let s; try { s = JSON.parse(raw); } catch(e){ uiAlert({ title:"Couldn't read backup", message: e.message }); return; }
  if(!(await uiConfirm({ title:"Restore this backup?", message:"Your current board will be replaced. A snapshot of the current board is saved first, so you can undo.", okText:"Restore" }))) return;
  makeBackup("before-restore");
  s.cards.forEach(c => { if(!c.timer) c.timer = newTimer(); if(!c.logs) c.logs=[]; if(!c.links) c.links=[]; if(!c.type) c.type="project"; if(!Array.isArray(c.items)) c.items=[]; });
  state = s; save(); render(); closeModal();
  flashToast("Backup restored");
}
function openBackups(){
  currentModal = "backups";
  // gather rolling snapshots (newest first) + any emergency backups from a failed read
  const snaps = getSnapIdx().slice().reverse();
  const emergency = [];
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf(STORE_KEY + "__backup_") === 0) emergency.push({ ts: +k.split("_").pop() || 0, key: k, reason: "recovered (read error)" });
  }
  const all = snaps.concat(emergency.sort((a,b)=>b.ts-a.ts));
  const fmtWhen = ts => { const d = new Date(ts); return d.toLocaleDateString(undefined,{day:"numeric",month:"short"}) + " " + d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"}); };
  const rows = all.map(e =>
    `<div class="ts-row"><span class="nm"><div class="t">${esc(fmtWhen(e.ts))}</div>`+
      `<div class="n">${e.cards!=null?e.cards+" cards · ":""}${esc(e.reason||"auto")}</div></span>`+
      `<button class="mini-btn" data-restore-key="${esc(e.key)}">Restore</button></div>`).join("");
  const modal = document.getElementById("modal");
  modal.innerHTML =
    `<div class="modal-head"><strong>🕘 Backups</strong><button class="btn ghost x" onclick="closeModal()">✕</button></div>`+
    `<div class="modal-body">`+
      `<div class="hint" style="margin-bottom:10px">The app keeps the last ${MAX_SNAPS} automatic snapshots in this browser (on open + every 15 min) plus your manual ones. Restore any of them, or download a copy to keep off-device.</div>`+
      (all.length ? rows : `<div class="ts-empty">No snapshots yet.</div>`)+
    `</div>`+
    `<div class="modal-foot">`+
      `<button class="btn primary" onclick="makeBackup('manual'); openBackups();">＋ Back up now</button>`+
      `<button class="btn" onclick="exportData()">⤓ Download .json</button>`+
      `<button class="btn" onclick="document.getElementById('importFile').click()">⤒ Import file</button>`+
    `</div>`;
  document.getElementById("overlay").classList.add("show");
  modal.querySelectorAll("[data-restore-key]").forEach(b => b.onclick = () => restoreBackup(b.dataset.restoreKey));
}

      if(html){
        const doc = new DOMParser().parseFromString(html, "text/html");
        const a = doc.querySelector("a[href]");
        let t = a ? (a.textContent || "").trim() : ((doc.body && doc.body.textContent) || "").trim();
        if(t && !/^https?:\/\//i.test(t) && t.length <= 200) pastedTitle = t;
      }
    } catch(_){}
  });
  el.querySelector("#link-addfolder").onclick = () => addLinkFolder();
  // folder controls
  const toggleGroup = gid => { const g = groups.find(x => x.id === gid); if(g){ g.collapsed = !g.collapsed; save(); renderSidebar(); } };
  // click the header (incl. name) to expand/collapse; the name's own handler covers single vs double click
  el.querySelectorAll(".lf-head").forEach(h => h.addEventListener("click", e => {
    if(e.target.closest(".lf-del, .lf-name")) return;   // delete + name handled separately
    toggleGroup(h.closest(".link-folder").dataset.group);
  }));
  el.querySelectorAll(".lf-name[data-g]").forEach(n => {
    let clickTimer = null;
    // single click → open/close; double click → rename
    n.addEventListener("click", e => {
      e.stopPropagation();
      if(n.getAttribute("contenteditable") === "true") return;   // currently editing → ignore
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => toggleGroup(n.dataset.g), 210);
    });
    n.addEventListener("dblclick", e => {
      e.stopPropagation();
      clearTimeout(clickTimer);   // cancel the pending open/close
      n.setAttribute("contenteditable", "true"); n.focus();
      const r = document.createRange(); r.selectNodeContents(n);
      const s = getSelection(); s.removeAllRanges(); s.addRange(r);
    });
    n.addEventListener("keydown", e => { if(e.key === "Enter" && n.getAttribute("contenteditable") === "true"){ e.preventDefault(); n.blur(); } });
    n.addEventListener("blur", () => {
      if(n.getAttribute("contenteditable") !== "true") return;
      const g = groups.find(x => x.id === n.dataset.g); if(g){ g.name = n.textContent.trim() || "Untitled"; save(); }
      n.removeAttribute("contenteditable"); renderSidebar();
    });
  });
  el.querySelectorAll(".lf-del").forEach(b => b.onclick = () => deleteLinkFolder(b.dataset.g));
  // link controls
  el.querySelectorAll(".sidelink").forEach(row => {
    const id = row.dataset.link;
    row.querySelector(".sl-up").onclick = () => moveLink(id, -1);
    row.querySelector(".sl-down").onclick = () => moveLink(id, 1);
    row.querySelector(".sl-menu").onclick = e => { e.stopPropagation(); openLinkMenu(e, id); };
    row.addEventListener("dragstart", e => { draggingLinkId = id; row.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
    row.addEventListener("dragend", () => { row.classList.remove("dragging"); if(draggingLinkId){ draggingLinkId = null; commitLinkOrder(); } });
  });
  // drop targets: each folder's link list (incl. Unsorted)
  el.querySelectorAll(".lf-links").forEach(box => {
    box.addEventListener("dragover", e => {
      if(!draggingLinkId) return;
      e.preventDefault();
      box.classList.add("drop-over");
      const dragging = el.querySelector(".sidelink.dragging");
      if(!dragging) return;
      const after = getLinkAfter(box, e.clientY);
      if(after == null) box.appendChild(dragging);
      else box.insertBefore(dragging, after);
    });
    box.addEventListener("dragleave", e => { if(!box.contains(e.relatedTarget)) box.classList.remove("drop-over"); });
    box.addEventListener("drop", e => { if(draggingLinkId){ e.preventDefault(); box.classList.remove("drop-over"); } });
  });
}
function getLinkAfter(box, y){
  const els = [...box.querySelectorAll(".sidelink:not(.dragging)")];
  let closest = { offset: -Infinity, el: null };
  for(const child of els){
    const r = child.getBoundingClientRect();
    const offset = y - r.top - r.height/2;
    if(offset < 0 && offset > closest.offset) closest = { offset, el: child };
  }
  return closest.el;
}
// Read drag-reordered links (and their new folder) back into state.
function commitLinkOrder(){
  const seen = new Set(), newArr = [];
  document.querySelectorAll("#sidebar .link-folder").forEach(fEl => {
    const gid = fEl.dataset.group || null;   // "" -> null (Unsorted)
    fEl.querySelectorAll(".lf-links .sidelink").forEach(row => {
      const l = state.sideLinks.find(x => x.id === row.dataset.link);
      if(l && !seen.has(l.id)){ l.groupId = gid; newArr.push(l); seen.add(l.id); }
    });
  });
  // keep any links not shown in the DOM (e.g. inside collapsed folders) as-is
  state.sideLinks.forEach(l => { if(!seen.has(l.id)) newArr.push(l); });
  state.sideLinks = newArr;
  save(); renderSidebar();
}
function addLinkFolder(){
  const g = { id:"g"+Math.random().toString(36).slice(2,9), name:"New client", collapsed:false };
  (state.linkGroups = state.linkGroups || []).push(g);
  save(); renderSidebar();
  const n = document.querySelector(`.lf-name[data-g="${g.id}"]`);
  if(n){ n.focus(); const r = document.createRange(); r.selectNodeContents(n); const s = getSelection(); s.removeAllRanges(); s.addRange(r); }
}
async function deleteLinkFolder(gid){
  const g = (state.linkGroups||[]).find(x => x.id === gid); if(!g) return;
  const n = state.sideLinks.filter(l => (l.groupId||null) === gid).length;
  if(n && !(await uiConfirm({ title:`Delete folder “${g.name}”?`, message:`Its ${n} link${n===1?"":"s"} will move to Unsorted.`, okText:"Delete folder", danger:true }))) return;
  state.sideLinks.forEach(l => { if((l.groupId||null) === gid) l.groupId = null; });
  state.linkGroups = state.linkGroups.filter(x => x.id !== gid);
  save(); renderSidebar();
}
function moveLink(id, dir){
  const arr = state.sideLinks;
  const idx = arr.findIndex(l => l.id === id); if(idx < 0) return;
  const gid = arr[idx].groupId || null;
  let j = idx + dir;
  while(j >= 0 && j < arr.length && (arr[j].groupId || null) !== gid) j += dir;  // nearest neighbour in same group
  if(j < 0 || j >= arr.length) return;
  [arr[idx], arr[j]] = [arr[j], arr[idx]];
  save(); renderSidebar();
}
function assignLink(id, gid){
  const arr = state.sideLinks;
  const idx = arr.findIndex(l => l.id === id); if(idx < 0) return;
  const [l] = arr.splice(idx, 1);
  l.groupId = gid || null;
  let lastIdx = -1;
  arr.forEach((x, i) => { if((x.groupId||null) === (gid||null)) lastIdx = i; });
  arr.splice(lastIdx + 1, 0, l);
  save(); renderSidebar();
}
function openLinkMenu(e, id){
  e.preventDefault(); e.stopPropagation();

  ctx.querySelector('[data-a="copy"]').onclick = () => { hideCtx(); copyText(l.url); };

  ctx.querySelector('[data-a="remove"]').onclick = () => { hideCtx(); state.sideLinks = state.sideLinks.filter(x => x.id !== id); save(); renderSidebar(); };
  ctx.querySelectorAll("[data-move]").forEach(b => b.onclick = () => { hideCtx(); assignLink(id, b.dataset.move || null); });
}

function driveFileId(url){
  const s = String(url);
  const m = s.match(/\/d\/([a-zA-Z0-9_-]{20,})/) || s.match(/[?&]id=([a-zA-Z0-9_-]{20,})/);
  return m ? m[1] : null;
}
// Friendly label from a URL when the clipboard didn't carry a real title.
function smartLabel(url){
  const id = driveFileId(url);
  if(id && GFILE_TITLES[id]) return GFILE_TITLES[id];   // real Drive title if we know it
  try {
    const u = new URL(url);
    const h = u.hostname.replace(/^www\./, "");
    const p = u.pathname;
    if(h === "docs.google.com"){
      if(p.includes("/spreadsheets/")) return "Google Sheet";
      if(p.includes("/document/")) return "Google Doc";
      if(p.includes("/presentation/")) return "Google Slides";
      if(p.includes("/forms/")) return "Google Form";
      return "Google Docs";
    }
    if(h === "drive.google.com") return "Google Drive file";
    if(h === "sheets.google.com") return "Google Sheet";
    return h;
  } catch(e){ return url; }
}

    `<div class="modal-head"><strong>🗄 Archive</strong><button class="btn ghost x" onclick="closeModal()">✕</button></div>`+

      `<div class="hint" style="margin-bottom:10px">Archived cards are hidden from the board but kept here with their time logs. Restore them, or remove them permanently.</div>`+

  });
}

function normName(s){ return String(s).toLowerCase().replace(/https?:\/\/\S+/g," ").replace(/[^a-z0-9]+/g," ").replace(/\s+/g," ").trim(); }
// Apply the baked induction data onto matching cards (link if missing, shoot date). Idempotent.
function applyInductionData(cards, columns, announce){
  const colTitle = id => (columns.find(k => k.id === id) || {}).title || "";
  let linked = 0, dated = 0;
  INDUCTION_DATA.forEach(d => {
    const en = normName(d.name);
    if(en.length < 3) return;
    let match = null;
    cards.forEach(c => {
      if(c.archived) return;
      if(normName(c.title).includes(en)){
        const inInd = /induction/i.test(colTitle(c.columnId));
        if(!match || (inInd && !match.inInd)) match = { card:c, inInd };
      }
    });
    if(!match) return;
    const c = match.card;
    if(d.link){ const u = d.link.trim(); if(u && !(c.links||[]).some(l=>l.url===u)){ (c.links=c.links||[]).push({ label:"Induction", url:u }); linked++; } }
    if(d.shootDate && c.shootDate !== d.shootDate){ c.shootDate = d.shootDate; dated++; }
  });
  if(announce){ save(); render(); flashToast(`Induction info applied — ${linked} link${linked===1?"":"s"}, ${dated} date${dated===1?"":"s"}`); }
  return { linked, dated };
}

function indBaseList(){ return indBaseNoGroup().filter(i => indGroup==="all" || i.group===indGroup); }
function indVisibleList(){
  const v = IND_VIEWS.find(x => x.key === indView) || IND_VIEWS[0];

async function deleteIndGroup(id){
  if((state.inductionGroups||[]).length <= 1){ uiAlert({ title:"Keep at least one", message:"You need at least one category." }); return; }
  const g = state.inductionGroups.find(x => x.id === id); if(!g) return;
  const fallback = state.inductionGroups.find(x => x.id !== id);
  const used = state.inductions.filter(i => i.group === id).length;

/* ============================ Board navigation (wheel + drag pan) ============================ */
function setupBoardNav(){
  const board = document.getElementById("board");

  // Vertical wheel scrolls the board horizontally — but ONLY over the empty board.
  // Over a column, the wheel stays inside that column and simply stops at its top/
  // bottom edge (no spilling into horizontal scroll).
  board.addEventListener("wheel", e => {
    if(e.ctrlKey) return; // pinch-zoom gesture — leave it alone
    const dom = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
    // genuine horizontal trackpad swipe — let the browser handle it natively
    if(Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
    // cursor is over a column → keep the scroll vertical (let it rest at the edge)
    if(e.target.closest && e.target.closest(".col-cards")) return;
    if(dom === 0) return;
    e.preventDefault();
    board.scrollLeft += dom;
  }, { passive: false });

  // Drag to pan: middle-mouse anywhere, or left-click on the empty board background.
  let pan = null;
  board.addEventListener("mousedown", e => {
    const onBackground = e.target === board;
    if(e.button === 1 || (e.button === 0 && onBackground)){
      pan = { startX: e.clientX, startLeft: board.scrollLeft, moved: false };
      board.classList.add("panning");
      e.preventDefault();
    }
  });
  window.addEventListener("mousemove", e => {
    if(!pan) return;
    const dx = e.clientX - pan.startX;
    if(Math.abs(dx) > 2) pan.moved = true;
    board.scrollLeft = pan.startLeft - dx;
  });
  window.addEventListener("mouseup", () => { if(pan){ pan = null; board.classList.remove("panning"); } });
  // suppress middle-click autoscroll / paste
  board.addEventListener("auxclick", e => { if(e.button === 1) e.preventDefault(); });

  // Column drag-to-reorder (left/right). The dragged column is moved in the DOM as you go.
  board.addEventListener("dragover", e => {
    if(!draggingColEl) return;
    e.preventDefault();
    const after = getColumnAfter(board, e.clientX);
    if(after == null){ board.appendChild(draggingColEl); }
    else if(after !== draggingColEl){ board.insertBefore(draggingColEl, after); }
  });
  board.addEventListener("drop", e => { if(draggingColEl) e.preventDefault(); });
}
// iPhone swipe gestures: swipe in from the left edge to open the sidebar drawer,
// swipe left to close it. Commit on release so it never interferes with the board's
// horizontal touch-scroll or card dragging.
function setupTouchNav(){
  if(setupTouchNav._done) return; setupTouchNav._done = true;
  const EDGE = 28;     // px from the left edge that can start an "open" swipe
  const THRESH = 45;   // px of horizontal travel needed to commit
  let sx = 0, sy = 0, fromEdge = false, openAtStart = false, tracking = false;
  window.addEventListener("touchstart", e => {
    if(!isMobileView() || e.touches.length !== 1){ tracking = false; return; }
    const t = e.touches[0];
    sx = t.clientX; sy = t.clientY;
    openAtStart = document.body.classList.contains("mobile-nav-open");
    fromEdge = sx <= EDGE;
    tracking = fromEdge || openAtStart;   // only track edge-opens or closing an open drawer
  }, { passive: true });
  window.addEventListener("touchend", e => {
    if(!tracking) return; tracking = false;
    const t = e.changedTouches && e.changedTouches[0]; if(!t) return;
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if(Math.abs(dx) < THRESH || Math.abs(dy) > Math.abs(dx)) return;   // not a clear horizontal swipe
    if(!openAtStart && fromEdge && dx > 0){
      if(document.body.classList.contains("ind-mode")) return;          // no sidebar on the inductions tab
      setDrawer(true);
    } else if(openAtStart && dx < 0){
      setDrawer(false);
    }
  }, { passive: true });
}
let draggingColEl = null;
function wireColumnDrag(handle, colEl){
  handle.setAttribute("draggable", "true");
  handle.addEventListener("dragstart", e => {
    draggingColEl = colEl;
    colEl.classList.add("col-dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", "column"); } catch(_){}
    try { e.dataTransfer.setDragImage(colEl, 24, 16); } catch(_){}
  });
  handle.addEventListener("dragend", () => {
    colEl.classList.remove("col-dragging");
    if(draggingColEl){ draggingColEl = null; commitColumnOrder(); }
  });
}
function getColumnAfter(board, x){
  const els = [...board.querySelectorAll(".column:not(.col-dragging)")];
  let closest = { offset: -Infinity, el: null };
  for(const child of els){
    const box = child.getBoundingClientRect();
    const offset = x - box.left - box.width / 2;
    if(offset < 0 && offset > closest.offset) closest = { offset, el: child };
  }
  return closest.el;
}
function commitColumnOrder(){
  const order = [...document.getElementById("board").querySelectorAll(".column")].map(el => el.dataset.colId);
  state.columns.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
  save(); render();
}

/* ============================ App icon (favicon + home-screen) ============================ */
function drawAppIcon(size){
  const c = document.createElement("canvas"); c.width = c.height = size;
  const x = c.getContext("2d");
  x.scale(size/512, size/512);   // draw everything in a fixed 512 grid
  const rr = (X, Y, W, H, R) => { if(x.roundRect){ x.beginPath(); x.roundRect(X, Y, W, H, R); } else { x.beginPath(); x.moveTo(X+R,Y); x.arcTo(X+W,Y,X+W,Y+H,R); x.arcTo(X+W,Y+H,X,Y+H,R); x.arcTo(X,Y+H,X,Y,R); x.arcTo(X,Y,X+W,Y,R); x.closePath(); } };
  // gradient background
  const g = x.createLinearGradient(0, 0, 512, 512);
  g.addColorStop(0, "#3b6fd6"); g.addColorStop(.55, "#5b5cf0"); g.addColorStop(1, "#8a45e0");
  x.fillStyle = g; rr(0, 0, 512, 512, 112); x.fill();
  // soft top highlight
  const hl = x.createLinearGradient(0, 0, 0, 300);
  hl.addColorStop(0, "rgba(255,255,255,.16)"); hl.addColorStop(1, "rgba(255,255,255,0)");
  x.fillStyle = hl; rr(0, 0, 512, 512, 112); x.fill();
  // "MF" monogram (upper third)
  x.fillStyle = "#ffffff"; x.textAlign = "center"; x.textBaseline = "middle";
  x.font = "800 184px system-ui, -apple-system, 'Segoe UI', Arial, sans-serif";
  x.fillText("MF", 256, 176);
  // mini kanban board underneath
  const colW = 92, gap = 26, n = 3, totalW = n*colW + (n-1)*gap, startX = (512 - totalW)/2;
  const colY = 300, colH = 150, pad = 13, cardH = 23, cardGap = 12, cardW = colW - pad*2;
  const counts = [2, 1, 3];
  for(let i = 0; i < n; i++){
    const cx = startX + i*(colW + gap);
    x.fillStyle = "rgba(255,255,255,.22)"; rr(cx, colY, colW, colH, 14); x.fill();
    x.fillStyle = "rgba(255,255,255,.93)";
    for(let k = 0; k < counts[i]; k++){
      const cy = colY + pad + k*(cardH + cardGap);
      if(cy + cardH > colY + colH - pad) break;
      rr(cx + pad, cy, cardW, cardH, 7); x.fill();
    }
  }
  return c;
}
function installIcons(){
  try {
    const href = "icon.png";   // the app icon, served alongside index.html
    const setLink = (rel, h, type) => {
      let el = document.querySelector('link[rel="'+rel+'"]');
      if(!el){ el = document.createElement("link"); el.rel = rel; document.head.appendChild(el); }
      if(type) el.type = type; el.href = h;
    };
    setLink("icon", drawAppIcon(64).toDataURL("image/png"), "image/png");   // browser-tab favicon = generated MF + kanban mark
    setLink("apple-touch-icon", href);                                       // iOS home screen = the custom planet icon
    const abs = new URL(href, location.href).href;   // manifest needs an absolute icon URL
    const man = { name:"Project Tracker", short_name:"Tracker", start_url:".", display:"standalone",
      background_color:"#000000", theme_color:"#3b6fd6",
      icons:[ { src:abs, sizes:"512x512", type:"image/png", purpose:"any" } ] };
    const url = URL.createObjectURL(new Blob([JSON.stringify(man)], { type:"application/json" }));
    setLink("manifest", url);
  } catch(e){ /* keep the static fallback icons in <head> */ }
}
