<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --ink: #1f2933;
    --muted: #7b8794;
    --line: #e1e5ea;
    --accent: #3b6fd6;
    --shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.06);
    --shadow-lg: 0 10px 30px rgba(16,24,40,.18);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Top bar ---------- */
  header.topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    box-shadow: var(--shadow);
    z-index: 40;
    flex: 0 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
  .brand .dot { width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg,#3b6fd6,#6f4fd6); }
  .spacer { flex: 1; }
  .btn {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .12s, border-color .12s, transform .05s;
    white-space: nowrap;
  }
  .btn:hover { background: #f3f5f9; border-color: #cfd6df; }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #335fc0; }
  .btn.danger { color: #c0392b; }
  .btn.danger:hover { background: #fdecea; border-color: #f0c4be; }
  .btn.ghost { border-color: transparent; background: transparent; }
  .btn.ghost:hover { background: #eef1f6; }
  .running-pill {
    display: inline-flex; align-items: center; gap: 7px;
    background: #fff2f2; color: #c0392b; border: 1px solid #f3c7c2;
    padding: 6px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 700;
    cursor: pointer;
  }
  .search-box { width: 190px; border: 1px solid var(--line); border-radius: 9px; padding: 7px 11px; font-size: 13px; font-family: inherit; color: var(--ink); background: var(--bg); outline: none; transition: width .15s; }
  .search-box:focus { width: 250px; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,111,214,.15); background: var(--panel); }
  .search-count { font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap; }

  /* collapsed column strip */
  .column.collapsed { flex: 0 0 42px; width: 42px; cursor: pointer; flex-direction: column; align-items: center; padding: 10px 0; gap: 8px; }
  .column.collapsed:hover { background: #e3e6ea; }
  .column.collapsed .col-color { width: 12px; height: 12px; border-radius: 4px; }
  .column.collapsed .collapsed-title { writing-mode: vertical-rl; transform: rotate(180deg); font-weight: 800; font-size: 12.5px; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-height: 68vh; }
  .column.collapsed .collapsed-count { font-size: 11px; font-weight: 700; color: var(--muted); }
  .col-grip { cursor: grab; color: #b3bac4; font-size: 13px; line-height: 1; padding: 2px 1px; flex: 0 0 auto; user-select: none; }
  .col-grip:hover { color: var(--muted); }
  .col-grip:active { cursor: grabbing; }
  .column.col-dragging { opacity: .45; }
  .col-collapse { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; padding: 2px 3px; border-radius: 5px; flex: 0 0 auto; }
  .col-collapse:hover { background: #dde1e6; color: var(--ink); }

  /* undo toast */
  .toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px); background: #232b36; color: #fff; padding: 10px 14px; border-radius: 10px; box-shadow: var(--shadow-lg); z-index: 70; display: flex; align-items: center; gap: 14px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  .toast button { background: none; border: none; color: #8fb6ff; font-weight: 800; cursor: pointer; font-size: 13px; }
  .toast button:hover { color: #b9d2ff; }
  .reconnect-banner { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-12px); background: #fff7e6; border: 1px solid #f0d9a8; color: #7a5a16; padding: 8px 10px 8px 14px; border-radius: 10px; box-shadow: var(--shadow-lg); z-index: 75; display: none; align-items: center; gap: 10px; font-size: 13px; }
  .reconnect-banner.show { display: flex; }
  .reconnect-banner .btn { padding: 6px 12px; }
  body.dark .reconnect-banner { background: #2e2613; border-color: #51461f; color: #e6c878; }

  /* login screen */
  .login-screen { position: fixed; inset: 0; z-index: 95; background: var(--bg); display: none; align-items: center; justify-content: center; padding: 20px; }
  .login-screen.show { display: flex; }
  .login-box { width: 330px; max-width: 100%; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-lg); padding: 28px 26px; display: flex; flex-direction: column; gap: 11px; }
  .login-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; }
  .login-brand .dot { width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg,#3b6fd6,#6f4fd6); }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .login-input { border: 1px solid var(--line); border-radius: 9px; padding: 11px 12px; font-size: 15px; font-family: inherit; outline: none; background: var(--bg); color: var(--ink); }
  .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,111,214,.15); }
  .login-btn { padding: 11px; font-size: 14px; margin-top: 4px; width: 100%; }
  .login-err { font-size: 12.5px; min-height: 14px; line-height: 1.4; }
  .login-toggle { font-size: 12.5px; color: var(--muted); text-align: center; }
  .login-toggle a { color: var(--accent); text-decoration: none; font-weight: 700; margin-left: 4px; }

  /* ---------- phone / small screens ---------- */
  .mobile-scrim { display: none; }
  .mobile-nav-close { display: none; }
  /* NOTE: the full mobile @media block lives at the very END of this stylesheet
     so it reliably overrides the base desktop styles defined below. */

  /* styled dialog (prompt / confirm / alert) */
  .dlg-overlay { z-index: 90; }
  .dlg { background: var(--panel); border-radius: 15px; box-shadow: var(--shadow-lg); width: 400px; max-width: 100%; overflow: hidden; }
  .dlg-head { padding: 17px 20px 0; font-weight: 800; font-size: 15.5px; color: var(--ink); }
  .dlg-body { padding: 9px 20px 4px; font-size: 13.5px; color: var(--ink); line-height: 1.5; }
  .dlg-body .dlg-sub { color: var(--muted); }
  .dlg-label { display: block; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); margin: 10px 0 6px; }
  .dlg-input { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--ink); background: var(--bg); outline: none; }
  .dlg-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,111,214,.18); }
  .dlg-foot { padding: 16px 20px 18px; display: flex; gap: 9px; justify-content: flex-end; }
  .dlg-foot .btn { padding: 8px 16px; }
  .dlg-foot .btn.danger { background: #d8473e; border-color: #d8473e; color: #fff; }
  .dlg-foot .btn.danger:hover { background: #c0392b; }
  body.dark .dlg-input { background: #161d27; }
  body.dark .dlg-foot .btn.danger { background: #d8473e; border-color: #d8473e; color: #fff; }
  .running-pill .live { width: 8px; height: 8px; border-radius: 50%; background: #e74c3c; animation: blink 1.1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* ---------- Workspace + Sidebar ---------- */
  .workspace { flex: 1 1 auto; display: flex; min-height: 0; }
  .sidebar {
    flex: 0 0 270px; width: 270px;
    background: var(--panel); border-right: 1px solid var(--line);
    overflow-y: auto; padding: 16px 14px 64px; display: flex; flex-direction: column; gap: 20px;
  }
  body.sidebar-hidden .sidebar { display: none; }
  .side-sec h3 { margin: 0 0 9px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); display: flex; align-items: center; gap: 7px; }
  .palette-item { display: flex; align-items: center; gap: 10px; padding: 10px 11px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; cursor: grab; background: #fff; transition: border-color .12s, box-shadow .12s, transform .05s; }
  .palette-item:hover { border-color: var(--accent); box-shadow: var(--shadow); }
  .palette-item:active { cursor: grabbing; }
  .palette-item.dragging { opacity: .5; }
  .pi-icon { font-size: 18px; width: 26px; text-align: center; flex: 0 0 auto; }
  .pi-text { display: flex; flex-direction: column; min-width: 0; }
  .pi-label { font-size: 13.5px; font-weight: 700; }
  .pi-desc { font-size: 11px; color: var(--muted); }
  .add-col-btn { width: 100%; margin-top: 6px; border: 1px dashed #c3c9d2; background: transparent; color: var(--muted); padding: 9px; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .add-col-btn:hover { background: #eef1f6; color: var(--ink); border-color: #aab3c0; }
  /* floating Save button (bottom-left) */
  .save-fab { position: fixed; left: 16px; bottom: 16px; z-index: 55; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 9px 15px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: var(--shadow-lg); }
  .save-fab:hover { background: #335fc0; }
  .sidelink-add { display: flex; gap: 6px; margin-bottom: 8px; }
  .sidelink-add input { flex: 1; min-width: 0; border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; font-size: 12.5px; font-family: inherit; outline: none; }
  .sidelink-add input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,111,214,.15); }
  .sidelink-add button { flex: 0 0 auto; border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 8px; padding: 0 11px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .sidelink-list { display: flex; flex-direction: column; gap: 1px; }
  .sidelink { display: flex; align-items: center; gap: 4px; padding: 6px 4px; border-radius: 7px; }
  .sidelink:hover { background: #f6f7f9; }
  .sidelink.dragging { opacity: .45; }
  .sl-grip { flex: 0 0 auto; cursor: grab; color: #c2c9d2; font-size: 11px; opacity: 0; user-select: none; }
  .sidelink:hover .sl-grip { opacity: 1; }
  .sl-grip:active { cursor: grabbing; }
  .lf-links.drop-over { background: rgba(59,111,214,.08); border-radius: 8px; outline: 1px dashed #b9c6e6; }
  .sidelink a { flex: 1; min-width: 0; font-size: 12.5px; color: var(--accent); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidelink a:hover { text-decoration: underline; }
  .sidelink-act { flex: 0 0 auto; opacity: 0; border: none; background: none; cursor: pointer; color: var(--muted); font-size: 12px; padding: 0 2px; }
  .sidelink:hover .sidelink-act { opacity: 1; }
  .sidelink-act:hover { color: var(--ink); }
  .sidelink-rm:hover { color: #c0392b; }
  .side-empty { font-size: 12px; color: var(--muted); padding: 4px 4px 4px 8px; }
  /* link folders (by client) */
  .link-addfolder { margin-left: auto; border: 1px solid var(--line); background: var(--panel); color: var(--muted); border-radius: 6px; font-size: 11px; font-weight: 700; padding: 3px 8px; cursor: pointer; text-transform: none; letter-spacing: 0; }
  .link-addfolder:hover { background: #eef1f6; color: var(--ink); }
  .link-folder { margin-bottom: 6px; }
  .lf-head { display: flex; align-items: center; gap: 6px; padding: 7px 4px; border-bottom: 1px solid var(--line); cursor: pointer; border-radius: 6px; }
  .lf-head:hover { background: #f1f3f6; }
  body.dark .lf-head:hover { background: #2c3848; }
  .lf-toggle { border: none; background: none; cursor: pointer; color: var(--muted); font-size: 15px; line-height: 1; padding: 0 2px; flex: 0 0 auto; pointer-events: none; }
  .lf-name { flex: 1; min-width: 0; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .03em; color: var(--ink); outline: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .lf-name[contenteditable="true"] { cursor: text; white-space: normal; }
  .lf-name.plain { text-transform: uppercase; color: var(--muted); }
  .lf-name[contenteditable]:focus { background: rgba(59,111,214,.08); border-radius: 4px; }
  .lf-count { font-size: 10.5px; font-weight: 700; color: var(--muted); flex: 0 0 auto; }
  .lf-del { opacity: 0; border: none; background: none; cursor: pointer; color: var(--muted); font-size: 12px; padding: 0 2px; flex: 0 0 auto; }
  .lf-head:hover .lf-del { opacity: 1; }
  .lf-del:hover { color: #c0392b; }
  .lf-links { padding: 2px 0 2px 6px; }
  .sl-up, .sl-down { font-size: 11px; }
  .ctx-label { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); padding: 4px 10px 2px; }

  /* note + checklist cards */
  .note-card { border-left-color: var(--card-color, #e0b84a); background: #fffdf5; position: relative; }
  .note-edit-title { font-size: 13.5px; font-weight: 600; line-height: 1.35; outline: none; word-break: break-word; }
  .note-edit-body { font-size: 13px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; margin-top: 3px; outline: none; min-height: 18px; }
  .note-edit-title:empty:before, .note-edit-body:empty:before { content: attr(data-ph); color: #b3bac4; pointer-events: none; }
  .note-edit-title:focus, .note-edit-body:focus { background: rgba(59,111,214,.05); border-radius: 4px; }
  .note-archive { position: absolute; top: 6px; right: 6px; border: none; background: rgba(255,255,255,.7); color: var(--muted); cursor: pointer; font-size: 12px; line-height: 1; width: 20px; height: 20px; border-radius: 5px; opacity: 0; }
  .note-dup { position: absolute; top: 6px; right: 30px; border: none; background: rgba(255,255,255,.7); color: var(--muted); cursor: pointer; font-size: 12px; line-height: 1; width: 20px; height: 20px; border-radius: 5px; opacity: 0; }
  .note-card:hover .note-archive, .note-card:hover .note-dup { opacity: 1; }
  .note-archive:hover { background: #fdecea; color: #c0392b; }
  .note-dup:hover { background: #eef1f6; color: var(--ink); }
  body.dark .note-archive, body.dark .note-dup { background: rgba(0,0,0,.25); }
  .checklist-card .chk-count { font-size: 11px; color: var(--muted); font-weight: 700; }
  .chk-list { display: flex; flex-direction: column; gap: 1px; margin-top: 7px; }
  .chk-item { display: flex; align-items: flex-start; gap: 7px; font-size: 12.5px; line-height: 1.35; padding: 4px 4px; border-radius: 6px; cursor: grab; }
  .chk-item:hover { background: #f6f7f9; }
  .chk-item:active { cursor: grabbing; }
  .chk-item.chk-dragging { opacity: .4; }
  .chk-item input { margin-top: 2px; width: 14px; height: 14px; flex: 0 0 auto; accent-color: var(--accent); cursor: pointer; }
  .chk-item.done .chk-txt { text-decoration: line-through; color: var(--muted); }
  .chk-txt { flex: 1; min-width: 0; word-break: break-word; cursor: pointer; }
  .chk-empty { font-size: 12px; color: var(--muted); padding: 2px; }
  .chk-add { margin-top: 6px; }
  .chk-add-input { width: 100%; border: 1px solid var(--line); border-radius: 7px; padding: 5px 8px; font-size: 12px; font-family: inherit; outline: none; }
  .chk-add-input:focus { border-color: var(--accent); }
  /* editor checklist items */
  .ed-item { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
  .ed-item input[type=text] { flex: 1; border: 1px solid var(--line); border-radius: 7px; padding: 6px 8px; font-size: 13px; font-family: inherit; outline: none; }
  .ed-item .im-up, .ed-item .im-down { cursor: pointer; color: var(--muted); border: none; background: none; font-size: 13px; padding: 0 2px; flex: 0 0 auto; }
  .ed-item .im-up:hover, .ed-item .im-down:hover { color: var(--ink); }
  .ed-item .rm { cursor: pointer; color: var(--muted); border: none; background: none; font-size: 14px; }

  /* ---------- Board ---------- */
  .board {
    flex: 1 1 auto;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    gap: 16px;
    padding: 18px;
    align-items: flex-start;
    cursor: grab;
  }
  .board.panning { cursor: grabbing; user-select: none; }
  .column { cursor: default; }
  .column {
    flex: 0 0 300px;
    width: 300px;
    background: #eceef1;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    max-height: 100%;
    border: 1px solid #e0e3e8;
  }
  .col-head {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 12px 9px;
  }
  .col-color { width: 12px; height: 12px; border-radius: 4px; flex: 0 0 auto; cursor: pointer; }
  .col-title {
    font-weight: 700; font-size: 13.5px; letter-spacing: .02em; text-transform: uppercase;
    flex: 1; border: none; background: transparent; color: var(--ink); outline: none; min-width: 0;
  }
  .col-count { font-size: 12px; color: var(--muted); font-weight: 600; }
  .col-menu-btn { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 5px; border-radius: 6px; }
  .col-menu-btn:hover { background: #dde1e6; color: var(--ink); }
  .col-cards {
    overflow-y: auto;
    padding: 4px 10px 10px;
    display: flex; flex-direction: column; gap: 9px;
    min-height: 14px;
  }
  .col-cards.drag-over { background: rgba(59,111,214,.07); border-radius: 10px; }
  .add-card-btn {
    margin: 2px 10px 12px;
    border: 1px dashed #c3c9d2; background: transparent; color: var(--muted);
    padding: 8px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .add-card-btn:hover { background: #e3e6ea; color: var(--ink); }

  /* ---------- Card ---------- */
  .card {
    background: var(--panel);
    border-radius: 10px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    border-left: 4px solid var(--card-color, #cbd2da);
    padding: 10px 11px;
    cursor: pointer;
    position: relative;
    transition: box-shadow .12s, transform .06s;
  }
  .card:hover { box-shadow: 0 4px 12px rgba(16,24,40,.13); }
  .card.dragging { opacity: .45; }
  .card-img { width: 100%; border-radius: 7px; margin-bottom: 8px; max-height: 130px; object-fit: cover; display: block; }
  .card-title { font-size: 13.5px; font-weight: 600; line-height: 1.35; word-break: break-word; padding-right: 48px; }
  .card-topline { padding-right: 48px; }
  .card-topline .card-title { padding-right: 0; }
  .note-edit-title { padding-right: 50px; }
  .card-titlerow { display: flex; align-items: baseline; gap: 7px; padding-right: 44px; }
  .card-titlerow .card-title { flex: 1; min-width: 0; padding-right: 0; }
  .proj-num { flex: 0 0 auto; font-size: 13px; font-weight: 800; font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, var(--panel)); border-radius: 6px; padding: 2px 7px; }
  .cc-num { font-family: ui-monospace, Menlo, Consolas, monospace; font-weight: 800; color: var(--accent); font-size: 11px; }
  .card-path { display: flex; align-items: center; gap: 5px; margin-top: 7px; font-size: 11.5px; }
  .card-path .cp-icon { flex: 0 0 auto; }
  .card-path .cp-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-family: ui-monospace, Menlo, Consolas, monospace; }
  .card-path .cp-copy { flex: 0 0 auto; border: 1px solid var(--line); background: var(--panel); border-radius: 5px; cursor: pointer; font-size: 11px; padding: 1px 5px; }
  .card-path .cp-copy:hover { background: #eef1f6; }
  body.dark .card-path .cp-copy { background: #2d394a; border-color: #3a4656; }
  body.dark .card-path .cp-copy:hover { background: #38465a; }
  .card-title[contenteditable] { outline: none; cursor: text; }
  .card-title[contenteditable]:focus { background: rgba(59,111,214,.06); border-radius: 4px; }
  .card-title:empty:before { content: attr(data-ph); color: #b3bac4; pointer-events: none; }
  .card-topline { display: flex; align-items: baseline; gap: 6px; }
  .card-topline .card-title { flex: 1; min-width: 0; }
  .card-ctrls { position: absolute; top: 5px; right: 5px; display: flex; gap: 3px; }
  .card-edit, .card-menu { border: 1px solid var(--line); background: var(--panel); color: var(--muted); cursor: pointer; line-height: 1; width: 22px; height: 20px; border-radius: 6px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
  .card-edit { font-size: 11px; }
  .card-menu { font-size: 15px; font-weight: 700; }
  .card-edit:hover, .card-menu:hover { background: #eef1f6; color: var(--ink); border-color: #cfd6df; }
  body.dark .card-edit, body.dark .card-menu { background: #38465a; border-color: #4a5a70; color: #c8d3e0; }
  body.dark .card-edit:hover, body.dark .card-menu:hover { background: #44546a; color: var(--ink); }
  .card-notes { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.4; white-space: pre-wrap; word-break: break-word;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  /* compact card (dense list, e.g. Inductions) */
  .card.compact { padding: 7px 9px; }
  .card.compact .cc { display: flex; align-items: flex-start; gap: 7px; }
  .cc-title { flex: 1 1 auto; min-width: 0; font-size: 12.5px; font-weight: 600; line-height: 1.3; white-space: normal; word-break: break-word; }
  .cc-shoot { flex: 0 0 auto; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 5px; background: #eef1f5; color: #56616e; }
  .cc-shoot.near { background: #fdf3e3; color: #b7791f; }
  .cc-shoot.soon { background: #fdecea; color: #c0392b; }
  .cc-shoot.past { background: #f0f1f3; color: #9aa3af; }
  .cc-shoot.none { background: transparent; color: #b3bac4; border: 1px dashed #d3d8df; font-weight: 600; }
  .cc-link { flex: 0 0 auto; text-decoration: none; font-size: 12px; opacity: .8; }
  .cc-link:hover { opacity: 1; }
  .cc-time { flex: 0 0 auto; font-size: 10.5px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
  .cc-time.running { color: #c0392b; } .cc-time.paused { color: #b7791f; }
  .play-btn.cc-play { width: 24px; height: 24px; flex: 0 0 24px; font-size: 9px; margin-left: 0; }
  /* priority (urgent) */
  .prio-badge { display: inline-block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .03em; padding: 2px 7px; border-radius: 6px; margin-bottom: 6px; }
  .prio-badge.low { background: #eef1f5; color: #64748b; }
  .prio-badge.med { background: #e7eefb; color: #2c5cc4; }
  .prio-badge.high { background: #fdecd3; color: #9a5b12; }
  .prio-badge.crit { background: #fbe0dd; color: #b5271b; }
  .card.prio-high { outline: 2px solid #e0962a; outline-offset: -1px; }
  .card.prio-critical { outline: 2px solid #d8473e; outline-offset: -1px; }
  .cc-prio { margin-bottom: 3px; }
  .cc-prio .prio-badge { margin-bottom: 0; }
  body.dark .prio-badge.low { background: #2a3645; color: #aeb9c7; }
  body.dark .prio-badge.med { background: #1e3252; color: #9bc0ff; }
  body.dark .prio-badge.high { background: #3a3115; color: #e8b85a; }
  body.dark .prio-badge.crit { background: #3a1f1d; color: #ff8f84; }
  /* note bold/italic buttons */
  .note-fmt { border: 1px solid var(--line); background: var(--panel); color: var(--muted); cursor: pointer; width: 20px; height: 20px; border-radius: 5px; font-size: 11px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
  .note-fmt:hover { background: #eef1f6; color: var(--ink); }
  body.dark .note-fmt { background: #2d394a; border-color: #3a4656; color: #c8d3e0; }
  body.dark .note-fmt:hover { background: #38465a; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .status-pill { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: #eef1f5; color: #56616e; }
  .shoot-badge { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: #eef1f5; color: #56616e; }
  .shoot-badge.near { background: #fdf3e3; color: #b7791f; }
  .shoot-badge.soon { background: #fdecea; color: #c0392b; }
  .shoot-badge.past { background: #f0f1f3; color: #9aa3af; }
  .card-links { display: flex; flex-direction: column; gap: 3px; margin-top: 7px; }
  .link-chip {
    font-size: 11.5px; color: var(--accent); text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px; max-width: 100%;
  }
  .link-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .link-chip:hover { text-decoration: underline; }
  .card-foot { display: flex; align-items: center; gap: 8px; margin-top: 9px; }
  .time-badge {
    font-size: 11.5px; font-weight: 700; color: var(--muted);
    font-variant-numeric: tabular-nums;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .time-badge.running { color: #c0392b; }
  .time-badge.paused { color: #b7791f; }
  .play-btn {
    margin-left: auto;
    border: 1px solid var(--line); background: #fff; cursor: pointer;
    width: 28px; height: 28px; flex: 0 0 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 12px; padding: 0;
  }
  .play-btn:hover { background: #eef3fc; }
  .play-btn.running { background: #fdecea; border-color: #f5c6c0; color: #c0392b; }
  .play-btn.paused { background: #fdf3e3; border-color: #f0dcb4; color: #b7791f; }

  /* ---------- Timer tray ---------- */
  .tray {
    position: fixed; right: 16px; bottom: 16px; width: 320px; max-height: 60vh;
    background: var(--panel); border-radius: 14px; box-shadow: var(--shadow-lg);
    border: 1px solid var(--line); z-index: 50; display: none; flex-direction: column; overflow: hidden;
  }
  .tray.show { display: flex; }
  .tray-head { padding: 11px 14px; font-weight: 700; font-size: 13px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
  .tray-body { overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 7px; }
  .tray-item { border: 1px solid var(--line); border-radius: 10px; padding: 9px 10px; border-left: 4px solid var(--card-color,#cbd2da); }
  .tray-item .ti-title { font-size: 12.5px; font-weight: 600; line-height: 1.3; }
  .tray-item .ti-row { display: flex; align-items: center; gap: 6px; margin-top: 7px; }
  .tray-time { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; cursor: text; border-bottom: 1px dashed transparent; }
  .tray-time:hover { border-bottom-color: currentColor; }
  .tray-time-input { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; width: 96px; border: 1px solid var(--accent); border-radius: 6px; padding: 2px 6px; outline: none; box-shadow: 0 0 0 3px rgba(59,111,214,.15); }
  .tray-time.running { color: #c0392b; }
  .tray-time.paused { color: #b7791f; }
  .mini-btn { border: 1px solid var(--line); background: #fff; border-radius: 7px; font-size: 11px; font-weight: 700; padding: 4px 8px; cursor: pointer; }
  .mini-btn:hover { background: #f0f3f8; }
  .mini-btn.stop { color: #c0392b; }
  .tray-empty { padding: 18px; text-align: center; color: var(--muted); font-size: 12.5px; }

  /* ---------- Modal ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(16,24,40,.45); z-index: 60; display: none; align-items: center; justify-content: center; padding: 20px; }
  .overlay.show { display: flex; }
  .modal { background: var(--panel); border-radius: 16px; box-shadow: var(--shadow-lg); width: 560px; max-width: 100%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-head { padding: 14px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  .modal-head .x { margin-left: auto; }
  .modal-body { padding: 16px 18px; overflow-y: auto; }
  .modal-foot { padding: 12px 18px; border-top: 1px solid var(--line); display: flex; gap: 8px; align-items: center; }
  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); margin-bottom: 6px; }
  .input, .textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px;
    font-size: 14px; font-family: inherit; color: var(--ink); outline: none; background: #fff;
  }
  .input:focus, .textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,111,214,.15); }
  .textarea { resize: vertical; min-height: 84px; line-height: 1.45; }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { width: 26px; height: 26px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
  .swatch.sel { border-color: var(--ink); box-shadow: 0 0 0 2px #fff inset; }
  .link-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .link-row .input { flex: 1; }
  .links-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .links-list .li { display: flex; align-items: center; gap: 8px; font-size: 12.5px; background: #f6f7f9; border-radius: 8px; padding: 6px 9px; }
  .links-list .li a { color: var(--accent); text-decoration: none; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .links-list .li .rm { cursor: pointer; color: var(--muted); border: none; background: none; font-size: 14px; }
  .log-list { display: flex; flex-direction: column; gap: 5px; max-height: 160px; overflow-y: auto; }
  .log-item { display: flex; align-items: center; gap: 10px; font-size: 12.5px; padding: 6px 9px; background: #f6f7f9; border-radius: 8px; }
  .log-item .dur { font-weight: 700; font-variant-numeric: tabular-nums; }
  .log-item .dt { color: var(--muted); flex: 1; }
  .log-item .rm { cursor: pointer; color: var(--muted); border: none; background: none; font-size: 14px; }
  .img-preview { max-width: 100%; border-radius: 9px; margin-top: 8px; display: block; }
  .hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  .danger { color: #c0392b; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  /* context menu */
  .ctx { position: fixed; background: #fff; border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow-lg); z-index: 80; padding: 5px; min-width: 170px; display: none; }
  .ctx.show { display: block; }
  .ctx button { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; border: none; background: none; padding: 8px 10px; border-radius: 7px; font-size: 13px; cursor: pointer; color: var(--ink); }
  .ctx button:hover { background: #f0f3f8; }
  .ctx button.danger:hover { background: #fdecea; }
  .ctx .sep { height: 1px; background: var(--line); margin: 4px 2px; }
  .ctx .swatches { padding: 6px 8px; }

  /* reports */
  table.rep { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.rep th, table.rep td { text-align: left; padding: 7px 9px; border-bottom: 1px solid var(--line); }
  table.rep th { color: var(--muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; }
  table.rep td.num, table.rep th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rep-group { font-weight: 700; background: #f6f7f9; }
  .archived-tag { font-size: 10px; background: #e6e8ec; color: var(--muted); padding: 1px 6px; border-radius: 6px; font-weight: 700; text-transform: uppercase; margin-left: 6px; }

  /* help / shortcuts panel */
  .help-sec-title { font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 4px 0 10px; }
  .help-grid { display: grid; grid-template-columns: 64px 1fr; gap: 9px 14px; align-items: center; margin-bottom: 6px; }
  .help-grid .k { text-align: right; }
  .help-grid .d { font-size: 13px; color: var(--ink); }
  kbd { display: inline-block; min-width: 16px; text-align: center; padding: 3px 8px; border: 1px solid var(--line); border-bottom-width: 2px; border-radius: 6px; background: var(--bg); font: 700 12px/1.2 ui-monospace, Menlo, Consolas, monospace; color: var(--ink); }
  .help-tips { margin: 0; padding-left: 20px; }
  .help-tips li { font-size: 13px; line-height: 1.55; margin-bottom: 7px; color: var(--ink); }
  /* focus view */
  .focus-sec-title { font-size: 12px; font-weight: 800; color: var(--muted); margin: 14px 0 6px; display: flex; align-items: center; gap: 7px; }
  .focus-sec-title:first-child { margin-top: 2px; }
  .focus-n { font-size: 10.5px; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 0 7px; }
  .focus-row { cursor: pointer; }
  .focus-row:hover { background: var(--bg); border-radius: 8px; }
  .focus-row .tm.running { color: #c0392b; } .focus-row .tm.paused { color: #b7791f; }
  body.dark .focus-row .tm.running { color: #ff8f84; } body.dark .focus-row .tm.paused { color: #e8b85a; }
  body.dark kbd { background: #11171f; }

  /* today pill + timesheet */
  .today-pill { display: inline-flex; align-items: center; gap: 8px; background: #eef3fc; border: 1px solid #d3e0f7; color: #2c4a8a; padding: 6px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .today-pill:hover { background: #e3edfb; }
  .today-pill strong { font-variant-numeric: tabular-nums; }
  .today-pill-bar { width: 56px; height: 6px; border-radius: 4px; background: #cfdcf3; overflow: hidden; }
  .today-pill-bar > span { display: block; height: 100%; width: 0; background: #3b6fd6; transition: width .4s; }
  .today-pill-bar > span.done { background: #2f9e51; }

  .ts-tabs { display: flex; gap: 6px; }
  .ts-tab { border: 1px solid var(--line); background: #fff; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--muted); }
  .ts-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ts-nav { display: flex; align-items: center; gap: 8px; margin: 4px 0 14px; }
  .ts-nav .lbl { font-weight: 800; font-size: 15px; flex: 1; }
  .ts-bar { height: 13px; border-radius: 7px; background: #eceef1; overflow: hidden; margin: 10px 0 5px; }
  .ts-bar-fill { height: 100%; background: linear-gradient(90deg,#4f86e8,#3b6fd6); border-radius: 7px; transition: width .4s; }
  .ts-bar-fill.done { background: linear-gradient(90deg,#37b566,#2f9e51); }
  .ts-bar-label { font-size: 12.5px; font-weight: 700; color: var(--muted); }
  .ts-bar-label .over { color: #2f9e51; }
  .ts-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 4px; border-bottom: 1px solid var(--line); }
  .ts-row .dot { width: 9px; height: 9px; border-radius: 3px; margin-top: 4px; flex: 0 0 auto; }
  .ts-row .nm { flex: 1; min-width: 0; }
  .ts-row .nm .t { font-size: 13.5px; font-weight: 600; }
  .ts-row .nm .n { font-size: 11.5px; color: var(--muted); margin-top: 2px; white-space: pre-wrap; }
  .ts-row .tm { font-variant-numeric: tabular-nums; font-weight: 800; font-size: 13.5px; }
  .ts-empty { padding: 26px; text-align: center; color: var(--muted); font-size: 13px; }
  .ts-day { border: 1px solid var(--line); border-radius: 11px; padding: 11px 13px; margin-bottom: 9px; cursor: pointer; transition: background .1s; }
  .ts-day:hover { background: #f6f7f9; }
  .ts-day.today { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,111,214,.13); }
  .ts-day.empty { opacity: .6; }
  .ts-day-head { display: flex; align-items: baseline; gap: 8px; }
  .ts-day-head .dname { font-weight: 800; font-size: 14px; }
  .ts-day-head .ddate { font-size: 12px; color: var(--muted); }
  .ts-day-head .dtot { margin-left: auto; font-weight: 800; font-variant-numeric: tabular-nums; }
  .ts-mini { height: 8px; border-radius: 5px; background: #eceef1; overflow: hidden; margin: 8px 0 6px; }
  .ts-mini > span { display: block; height: 100%; background: #3b6fd6; }
  .ts-mini > span.done { background: #2f9e51; }
  .ts-sub { font-size: 12px; color: var(--muted); }
  .addtime-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .addtime-row .input { padding: 7px 9px; font-size: 13px; }
  .log-note-edit { cursor: pointer; color: var(--muted); border: none; background: none; font-size: 13px; }

  ::-webkit-scrollbar { height: 11px; width: 11px; }
  ::-webkit-scrollbar-thumb { background: #c7cdd6; border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #aeb6c2; background-clip: padding-box; }

  /* ===================== Dark mode ===================== */
  body.dark {
    --bg: #161c25; --panel: #232e3d; --ink: #f3f6fb; --muted: #b8c4d2;
    --line: #3a4859; --accent: #7aa5ff;
    --shadow: 0 1px 3px rgba(0,0,0,.55), 0 1px 2px rgba(0,0,0,.45);
    --shadow-lg: 0 14px 36px rgba(0,0,0,.65);
  }
  body.dark { background: var(--bg); }
  /* surfaces: board (darkest) < columns < cards (lightest) for clear separation */
  body.dark .play-btn { background: #36445a; border-color: #46556a; color: #9bbcff; }
  body.dark .play-btn:hover { background: #41526b; }
  body.dark .play-btn.running { background: #3a1f1d; border-color: #5e2e2b; color: #ff8f84; }
  body.dark .play-btn.paused { background: #382f14; border-color: #5a4a1e; color: #e8b85a; }
  body.dark .time-badge.running, body.dark .tray-time.running, body.dark .cc-time.running { color: #ff8f84; }
  body.dark .time-badge.paused, body.dark .tray-time.paused, body.dark .cc-time.paused { color: #e8b85a; }
  body.dark .card-img { opacity: .92; }
  body.dark .btn { background: #2c3848; }
  body.dark .btn:hover { background: #38465a; border-color: #4a5a70; }
  body.dark .btn.ghost { background: transparent; }
  body.dark .btn.ghost:hover { background: #222b38; }
  body.dark .btn.danger { color: #ff8f84; }
  body.dark .btn.danger:hover { background: #3a1f1d; border-color: #5e2e2b; }
  body.dark .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  body.dark .column { background: #1c2532; border-color: #344253; }
  body.dark .card { background: #2a3645; border-color: #3c4a5c; border-left-color: var(--card-color, #4a5a70); }  /* keep colour stripe; subtle default */
  body.dark .card:hover { box-shadow: 0 6px 18px rgba(0,0,0,.5); border-color: #50617a; border-left-color: var(--card-color, #50617a); }
  body.dark .column.collapsed:hover { background: #202a37; }
  body.dark .col-menu-btn:hover, body.dark .col-collapse:hover { background: #2a3543; color: var(--ink); }
  body.dark .add-card-btn { border-color: #39434f; }
  body.dark .add-card-btn:hover { background: #222b38; color: var(--ink); }
  body.dark .add-col-btn { border-color: #39434f; }
  body.dark .add-col-btn:hover { background: #222b38; color: var(--ink); }
  body.dark .col-cards.drag-over { background: rgba(91,139,240,.14); }
  body.dark .input, body.dark .textarea, body.dark .search-box,
  body.dark .sidelink-add input, body.dark .chk-add-input, body.dark .todo-add input,
  body.dark .tray-time-input, body.dark .ed-item input[type=text] { background: #161d27; color: var(--ink); border-color: #3a4859; }
  body.dark .note-card { background: #36301c; border-color: #514624; border-left-color: var(--card-color, #e6bb52); }
  body.dark ::selection { background: rgba(108,155,255,.32); }
  body.dark .card-title[contenteditable]:focus, body.dark .note-edit-title:focus, body.dark .note-edit-body:focus { background: rgba(108,155,255,.12); }
  body.dark .input:focus, body.dark .textarea:focus, body.dark .search-box:focus { box-shadow: 0 0 0 3px rgba(108,155,255,.22); }
  body.dark .note-edit-title:empty:before, body.dark .note-edit-body:empty:before { color: #6b7686; }
  body.dark .status-pill, body.dark .shoot-badge, body.dark .cc-shoot { background: #36445a; color: #c8d3e0; }
  body.dark .cc-shoot.none { background: transparent; border-color: #3a4654; color: #7e8a98; }
  body.dark .shoot-badge.near, body.dark .cc-shoot.near { background: #3a3115; color: #e6b34d; }
  body.dark .shoot-badge.soon, body.dark .cc-shoot.soon { background: #3a1f1d; color: #ff8f84; }
  body.dark .shoot-badge.past, body.dark .cc-shoot.past { background: #313e4f; color: #a3afbd; }
  body.dark .today-pill { background: #1e3252; border-color: #335081; color: #cfe0fb; }
  body.dark .today-pill-bar { background: #335081; }
  body.dark .running-pill { background: #462624; border-color: #7a3a36; color: #ffaaa0; }
  body.dark .mini-btn { background: #36445a; color: var(--ink); }
  body.dark .mini-btn:hover { background: #41526b; }
  body.dark .ctx { background: #232e3d; border-color: #3a4859; }
  body.dark .ctx button:hover { background: #38465a; }
  body.dark .ctx button.danger:hover { background: #4a2422; }
  body.dark .links-list .li, body.dark .log-item, body.dark .ts-day:hover,
  body.dark .chk-item:hover, body.dark .sidelink:hover, body.dark .rep-group,
  body.dark .todo-item:hover { background: #2c3848; }
  body.dark .ts-tab { background: #2c3848; }
  body.dark .ts-tab.active { background: var(--accent); color: #fff; }
  body.dark .ts-bar, body.dark .ts-mini { background: #313e4f; }
  body.dark .palette-item { background: #2a3645; }
  body.dark .link-addfolder { background: #2c3848; }
  body.dark .link-addfolder:hover { background: #38465a; }
  body.dark .lf-name[contenteditable]:focus { background: rgba(122,165,255,.16); }
  body.dark .lf-links.drop-over { background: rgba(122,165,255,.14); outline-color: #3f5070; }
  body.dark .archived-tag { background: #3a4859; color: #b8c4d2; }
  body.dark .col-title { color: var(--ink); }
  body.dark ::-webkit-scrollbar-thumb { background: #3a4654; background-clip: padding-box; }
  body.dark ::-webkit-scrollbar-thumb:hover { background: #4a5868; background-clip: padding-box; }

  /* ============================================================
     PHONE / SMALL SCREENS  — placed last so it overrides desktop
     ============================================================ */
  @media (max-width: 640px) {
    .topbar { flex-wrap: wrap; gap: 6px; padding: 8px 10px; row-gap: 7px; }
    .topbar .btn { padding: 8px 11px; font-size: 12.5px; }
    .brand { font-size: 15px; }
    .brand .dot { width: 18px; height: 18px; }
    .search-box { width: 100%; order: 99; } .search-box:focus { width: 100%; }  /* search drops to its own full-width row */
    .search-count { order: 99; }
    .today-pill { font-size: 11px; padding: 5px 8px; }
    .today-pill-bar { width: 40px; }

    /* board fills the whole screen now (sidebar is an overlay drawer) */
    .board { padding: 14px 12px 90px; gap: 14px; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
    .column { flex: 0 0 88vw; width: 88vw; scroll-snap-align: start; }

    /* ---- sidebar = slide-in drawer (hidden by default) ---- */
    .sidebar {
      position: fixed; top: 0; bottom: 0; left: 0;
      width: min(84vw, 340px); max-width: 340px;
      z-index: 80; display: flex;
      transform: translateX(-100%);
      transition: transform .25s ease;
      box-shadow: var(--shadow-lg);
      padding: 20px 16px 90px;
    }
    body.sidebar-hidden .sidebar { display: flex; }   /* desktop "hidden" pref must not hide the mobile drawer */
    body.mobile-nav-open .sidebar { transform: translateX(0); }
    /* dim backdrop behind the drawer */
    body.mobile-nav-open .mobile-scrim {
      display: block; position: fixed; inset: 0;
      background: rgba(8,12,18,.5); z-index: 78;
    }
    /* round ✕ to close the drawer */
    body.mobile-nav-open .mobile-nav-close {
      display: flex; align-items: center; justify-content: center;
      position: fixed; top: 12px; right: 12px; z-index: 82;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--panel); color: var(--ink);
      border: 1px solid var(--line); box-shadow: var(--shadow-lg);
      font-size: 17px; cursor: pointer;
    }

    /* bigger, easier tap targets inside the drawer */
    .sidelink { padding: 10px 6px; }
    .sidelink a { font-size: 13.5px; }
    .sidelink-act, .sl-grip { opacity: 1; }
    .palette-item { padding: 12px 12px; }

    .save-fab { left: 12px; bottom: 12px; }
    .tray { width: 92vw; right: 4vw; }
    .modal, .dlg { width: 94vw; }
    .card-menu, .card-edit, .note-archive, .sl-grip { opacity: 1; }   /* always show controls on touch */
  }
</style>
</head>
<body>
  <header class="topbar">
    <button class="btn ghost" id="sidebarToggle" onclick="toggleSidebar()" title="Show/hide sidebar" style="padding:7px 9px">☰</button>
    <div class="brand"><div class="dot"></div> Project Tracker</div>
    <input id="searchBox" class="search-box" type="search" placeholder="🔍 Search cards…" oninput="setSearch(this.value)" autocomplete="off" />
    <span id="searchCount" class="search-count"></span>
    <div class="today-pill" onclick="openTimesheet('day')" title="Today's timesheet">
      📅 Today <strong id="todayPillText">0m / 8h</strong>
      <span class="today-pill-bar"><span id="todayPillBar"></span></span>
    </div>
    <div class="running-pill" id="runningPill" style="display:none" onclick="toggleTray(true)">
      <span class="live"></span><span id="runningPillText">0 running</span>
    </div>
    <button class="btn ghost" onclick="openFocus()" title="What needs you now (F)">🎯 Focus</button>
    <button class="btn ghost" onclick="toggleTray()" title="Timers">⏱ Timers</button>
    <button class="btn ghost" onclick="openTimesheet('day')" title="Timesheet">📅 Timesheet</button>
    <button class="btn ghost" onclick="openReports()" title="All-time totals">📊 Totals</button>
    <button class="btn ghost" onclick="openArchive()" title="Archived &amp; deleted cards">🗄 Archive</button>
    <div class="spacer"></div>
    <button class="btn ghost" id="dataMenuBtn" onclick="openDataMenu(event)" title="Backups, export &amp; import">🗂 Data ▾</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)" />
    <button class="btn ghost" onclick="openShortcuts()" title="Keyboard shortcuts &amp; quick guide" style="padding:7px 9px">⌨</button>
    <button class="btn ghost" id="themeBtn" onclick="toggleTheme()" title="Light / dark" style="padding:7px 9px">🌙</button>
  </header>

  <div class="workspace">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="board" id="board"></div>
  </div>

  <!-- mobile drawer backdrop + close (only visible on small screens when the menu is open) -->
  <div class="mobile-scrim" onclick="closeMobileNav()"></div>
  <button class="mobile-nav-close" onclick="closeMobileNav()" aria-label="Close menu">✕</button>

  <!-- floating Save (bottom-left, out of the way) -->

  <!-- Timer tray -->

  <!-- undo toast -->
  <div class="toast" id="toast"><span id="toastMsg"></span><button id="toastUndo">Undo</button></div>

  <!-- styled dialog (replaces native prompt/confirm/alert) -->
  <div class="overlay dlg-overlay" id="dlgOverlay"><div class="dlg" id="dlg"></div></div>

  <!-- login screen (shown only when the cloud backend is configured) -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="login-brand"><div class="dot"></div> Project Tracker</div>
      <div class="login-sub" id="loginSub">Sign in to your tracker</div>
      <input class="login-input" id="loginEmail" type="email" placeholder="Email" autocomplete="username" />
      <input class="login-input" id="loginPass" type="password" placeholder="Password" autocomplete="current-password" />
      <button class="btn primary login-btn" id="loginBtn">Sign in</button>
      <div class="login-err" id="loginErr"></div>
      <div class="login-toggle">
        <span id="loginToggleText">No account yet?</span>
        <a href="#" id="loginToggleLink">Create one</a>
      </div>
    </div>
  </div>

  <!-- reconnect-your-data-file banner -->
  <div class="reconnect-banner" id="reconnectBanner">
    <span>🔌 Reconnect <b class="rb-name">your data file</b> to keep auto-saving</span>
    <button class="btn primary" onclick="reconnectDataFile()">Reconnect</button>
    <button class="btn ghost" onclick="hideReconnectBanner()" style="padding:6px 9px">✕</button>
  </div>

<script>
"use strict";

/* ============================ State ============================ */
const STORE_KEY = "ptracker.v1";
const COLORS = [
  { name: "Blue",   value: "#3b6fd6" },
  { name: "Teal",   value: "#13a8a0" },
  { name: "Green",  value: "#2f9e51" },
  { name: "Amber",  value: "#e0962a" },
  { name: "Red",    value: "#d8473e" },
  { name: "Pink",   value: "#d8569e" },
  { name: "Purple", value: "#7a52d6" },
  { name: "Slate",  value: "#64748b" },
  { name: "Gray",   value: "#9aa3af" },
];

let state;  // initialised at the bottom, once all definitions (incl. INDUCTION_DATA) exist
let showArchived = false;
let searchQuery = "";

/* ---- search / filter ---- */
function setSearch(v){ searchQuery = v || ""; applySearch(); }
function cardMatches(c, q){
  if(!q) return true;
  const hay = [c.title, c.notes, c.status, (c.links||[]).map(l => (l.label||"") + " " + (l.url||"")).join(" "), (c.items||[]).map(i => i.text).join(" ")].join(" ").toLowerCase();
  return hay.indexOf(q) >= 0;
}
function applySearch(){
  const q = (searchQuery || "").trim().toLowerCase();
  let matches = 0;
  document.querySelectorAll("#board .card").forEach(el => {
    const c = card(el.dataset.cardId);
    const show = !q || (c && cardMatches(c, q));
    el.style.display = show ? "" : "none";
    if(q && show) matches++;
  });
  const ind = document.getElementById("searchCount");
  if(ind) ind.textContent = q ? (matches + " match" + (matches === 1 ? "" : "es")) : "";
  document.body.classList.toggle("searching", !!q);
}

/* ---- theme (light / dark) ---- */
function toggleTheme(){ state.dark = !state.dark; applyTheme(); save(); }
function applyTheme(){
  document.body.classList.toggle("dark", !!(state && state.dark));
  const b = document.getElementById("themeBtn");
  if(b) b.textContent = (state && state.dark) ? "☀️" : "🌙";
}

/* ---- undo (toast + Ctrl+Z stack) ---- */
let undoTimer = null;
let undoStack = [];   // most recent last; popped by the toast button or Ctrl+Z
function showUndo(message, undoFn){
  undoStack.push({ message, fn: undoFn });
  if(undoStack.length > 40) undoStack.shift();
  const btn = document.getElementById("toastUndo");
  btn.style.display = "";
  btn.textContent = "Undo";
  btn.onclick = () => performUndo();
  document.getElementById("toastMsg").textContent = message;
  document.getElementById("toast").classList.add("show");
  clearTimeout(undoTimer);
  undoTimer = setTimeout(hideToast, 6000);
}
// Run the most recent undo-able action (toast button or Ctrl+Z).
function performUndo(){
  const u = undoStack.pop();
  if(!u){ flashToast("Nothing to undo"); return false; }
  hideToast();
  try { u.fn(); } catch(e){}
  flashToast("↩ Undone");
  return true;
}
// A brief, non-actionable toast (no Undo button).
function flashToast(message){
  const btn = document.getElementById("toastUndo");
  document.getElementById("toastMsg").textContent = message;
  btn.style.display = "none";
  document.getElementById("toast").classList.add("show");
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { hideToast(); btn.style.display = ""; }, 1500);
}
function hideToast(){ document.getElementById("toast").classList.remove("show"); }

/* ---- styled dialogs (on-brand prompt / confirm / alert) ---- */
let dlgResolve = null, dlgCancelFn = null;
function openDialog(o){
  return new Promise(resolve => {
    dlgResolve = resolve;
    const isPrompt = o.kind === "prompt", isAlert = o.kind === "alert";
    const dlg = document.getElementById("dlg");
    dlg.innerHTML =
      (o.title ? `<div class="dlg-head">${esc(o.title)}</div>` : "") +
      `<div class="dlg-body">` +
        (o.message ? `<div class="dlg-sub">${esc(o.message).replace(/\n/g,"<br>")}</div>` : "") +
        (o.label ? `<label class="dlg-label">${esc(o.label)}</label>` : "") +
        (isPrompt ? `<input class="dlg-input" id="dlgInput" value="${esc(o.value||"")}" placeholder="${esc(o.placeholder||"")}" spellcheck="false" />` : "") +
      `</div>` +
      `<div class="dlg-foot">` +
        (isAlert ? "" : `<button class="btn" id="dlgCancel">${esc(o.cancelText||"Cancel")}</button>`) +
        `<button class="btn ${o.danger?'danger':'primary'}" id="dlgOk">${esc(o.okText || (isAlert?"OK":(isPrompt?"Save":"Confirm")))}</button>` +
      `</div>`;
    document.getElementById("dlgOverlay").classList.add("show");
    const done = val => { document.getElementById("dlgOverlay").classList.remove("show"); const r = dlgResolve; dlgResolve = null; dlgCancelFn = null; if(r) r(val); };
    const ok = () => done(isPrompt ? document.getElementById("dlgInput").value : (isAlert ? undefined : true));
    const cancel = () => done(isPrompt ? null : (isAlert ? undefined : false));
    dlgCancelFn = cancel;
    document.getElementById("dlgOk").onclick = ok;
    const cBtn = document.getElementById("dlgCancel"); if(cBtn) cBtn.onclick = cancel;
    if(isPrompt){
      const inp = document.getElementById("dlgInput");
      inp.focus(); inp.select();
      inp.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); ok(); } });
    } else {
      const okBtn = document.getElementById("dlgOk"); okBtn.focus();
    }
  });
}
function uiConfirm(o){ return openDialog(Object.assign({ kind:"confirm" }, typeof o==="string"?{message:o}:o)); }
function uiPrompt(o){ return openDialog(Object.assign({ kind:"prompt" }, o)); }
function uiAlert(o){ return openDialog(Object.assign({ kind:"alert" }, typeof o==="string"?{message:o}:o)); }
document.getElementById("dlgOverlay").addEventListener("click", e => { if(e.target.id === "dlgOverlay" && dlgCancelFn) dlgCancelFn(); });

/* ============================ Persistence ============================ */
function uid(){ return "id" + Math.random().toString(36).slice(2,10) + (state ? (state._n = (state._n||0)+1) : ""); }
let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
    catch(e){ uiAlert({ title:"Couldn't save", message:"Storage may be full (large images?). " + e.message }); }
    if(fileHandle) writeStateToFile();   // mirror to the connected file (durable)
    if(typeof cloudSave === "function") cloudSave();   // sync to the cloud (when logged in)
  }, 150);
}
// Explicit save: flush immediately (no debounce), snapshot, and confirm.
function saveNow(){
  clearTimeout(saveTimer);
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ uiAlert({ title:"Couldn't save", message:"Storage may be full (large images?). " + e.message }); return; }
  try { makeBackup("manual save"); } catch(e){}
  if(fileHandle) writeStateToFile();
  if(typeof cloudSave === "function") cloudSave();
  flashSaved();
}
function flashSaved(){
  const b = document.getElementById("saveBtn");
  if(!b) return;
  if(b._t) clearTimeout(b._t);
  b.textContent = "✓ Saved";
  b._t = setTimeout(() => { b.textContent = "💾 Save"; }, 1500);
}
function load(){
  const raw = localStorage.getItem(STORE_KEY);
  if(!raw) return null;
  let s;
  try { s = JSON.parse(raw); }
  catch(e){
    // Never silently overwrite unreadable data — keep a backup and bail.
    try { localStorage.setItem(STORE_KEY + "__backup_" + Date.now(), raw); } catch(_){}
    uiAlert({ title:"Couldn't read saved board", message:"A backup copy was kept (nothing was overwritten). Let Claude know so it can be recovered." });
    return null;
  }
  if(!s || !Array.isArray(s.cards) || !Array.isArray(s.columns)) return null;
  if(!Array.isArray(s.sideLinks)) s.sideLinks = [];
  if(!Array.isArray(s.linkGroups)) s.linkGroups = [];
  s.sideLinks.forEach(l => { if(l.groupId === undefined) l.groupId = null; });
  // Migrations run inside try/catch but we ALWAYS return the parsed data — a migration
  // bug must never discard the user's cards (incl. archived ones).
  if(!Array.isArray(s.statuses)) s.statuses = ["In Progress", "Waiting Feedback", "On Hold", "Awaiting PO", "Completed"];
  try {
    s.cards.forEach(c => { if(!c.timer) c.timer = newTimer(); if(!c.logs) c.logs = []; if(!c.links) c.links = []; if(c.shootDate===undefined) c.shootDate = null; if(c.status===undefined) c.status = ""; if(!c.type) c.type = "project"; if(!Array.isArray(c.items)) c.items = []; if(c.projectNumber===undefined) c.projectNumber = ""; if(c.filePath===undefined) c.filePath = ""; });
    // one-time: split "1499 - Name" titles into a separate project number + name
    if(!s._mig_projnum){
      s.cards.forEach(c => {
        if((c.type||"project") === "project" && !c.projectNumber){
          const m = (c.title||"").match(/^\s*(\d{3,5}[A-Za-z]?)\s*[-–—:]\s*(.+)$/);
          if(m){ c.projectNumber = m[1]; c.title = m[2].trim(); }
        }
      });
      s._mig_projnum = true;
    }
    // one-time: bake induction links/shoot dates onto existing cards and compact the Inductions column
    if(!s._mig_induction){
      try { applyInductionData(s.cards, s.columns, false); } catch(e){}
      const ind = s.columns.find(k => k.title === "Inductions");
      if(ind) ind.compact = true;
      s._mig_induction = true;
    }
    // one-time: convert the old sidebar To-Do / Notes into draggable cards (nothing lost)
    if(!s._mig_cards){
      const target = s.columns.find(k => /to-?do|notes/i.test(k.title)) || s.columns[0];
      if(target){
        let ord = s.cards.filter(c => c.columnId === target.id).length;
        if(Array.isArray(s.todos) && s.todos.length)
          s.cards.push(newCard("checklist", target.id, ord++, { title:"To-Do", items: s.todos.map(t => ({ id: t.id || ("i"+Math.random().toString(36).slice(2,9)), text: t.text, done: !!t.done })) }));
        if(typeof s.note === "string" && s.note.trim())
          s.cards.push(newCard("note", target.id, ord++, { title:"Notes", notes: s.note }));
      }
      s.todos = []; s.note = "";

/* ============================ Helpers ============================ */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function card(id){ return state.cards.find(c => c.id === id); }
function column(id){ return state.columns.find(k => k.id === id); }
function urgentRank(c){ return c.priority === "critical" ? 0 : c.priority === "high" ? 1 : 9; }  // very-urgent & urgent float to the top; everything else keeps manual order
function cardsIn(colId){ return state.cards.filter(c => c.columnId === colId && (showArchived || !c.archived)).sort((a,b) => urgentRank(a) - urgentRank(b) || a.order - b.order); }
function hostOf(url){ try { return new URL(url).hostname.replace(/^www\./,""); } catch(e){ return url; } }

function timerValue(t){ // live seconds
  let v = t.elapsed || 0;
  if(t.st === "running" && t.startedAt) v += (Date.now() - t.startedAt) / 1000;
  return v;
}
function loggedSeconds(c){ return (c.logs||[]).reduce((s,l)=>s+l.seconds,0); }
function totalSeconds(c){ return loggedSeconds(c) + timerValue(c.timer); }

function fmtClock(sec){
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  const p = n => String(n).padStart(2,"0");
  return (h>0? p(h)+":":"") + p(m) + ":" + p(s);
}
function parseClock(str){
  const parts = String(str).trim().split(":").map(x => parseInt(x,10) || 0);
  if(parts.length >= 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if(parts.length === 2) return parts[0]*60 + parts[1];
  return parts[0] * 60; // a lone number = minutes
}
function fmtHuman(sec){
  sec = Math.floor(sec);
  if(sec < 60) return sec + "s";
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
  if(h>0) return h + "h " + m + "m";
  return m + "m";
}
function fmtDate(ts){ const d = new Date(ts); return d.toLocaleDateString(undefined,{day:"numeric",month:"short"}) + " " + d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"}); }

/* ---- date helpers (daily / weekly timesheet) ---- */
const DAY_TARGET = 8 * 3600; // 8 hours in seconds
function startOfDay(ts){ const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function sameDay(a,b){ return startOfDay(a) === startOfDay(b); }
function addDays(ts,n){ const d = new Date(ts); d.setDate(d.getDate()+n); return d.getTime(); }
function startOfWeek(ts){ const d = new Date(startOfDay(ts)); const dow = (d.getDay()+6)%7; /* Mon=0 */ d.setDate(d.getDate()-dow); return d.getTime(); }
const DAYNAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// Per-project time on a given day. Includes live (running/paused) time if the day is today.
function daySummary(dayTs){
  const live = sameDay(dayTs, Date.now());
  const out = [];
  state.cards.forEach(c => {
    let secs = 0; const notes = [];
    (c.logs||[]).forEach(l => { if(sameDay(l.end, dayTs)){ secs += l.seconds; if(l.note) notes.push(l.note); } });
    if(live && c.timer.st !== "stopped") secs += timerValue(c.timer);
    if(secs > 0) out.push({ card:c, secs, notes });
  });
  return out.sort((a,b)=>b.secs-a.secs);
}
function daySeconds(dayTs){ return daySummary(dayTs).reduce((s,x)=>s+x.secs, 0); }

// Live shoot countdown from a stored "YYYY-MM-DD" shoot date.
function shootInfo(c){
  if(!c.shootDate) return null;
  const p = c.shootDate.split("-").map(Number);
  if(p.length<3 || !p[0]) return null;
  const target = startOfDay(new Date(p[0], p[1]-1, p[2]).getTime());
  const days = Math.round((target - startOfDay(Date.now())) / 86400000);
  const dateLabel = new Date(target).toLocaleDateString(undefined,{day:"numeric",month:"short"});
  let label;
  if(days === 0) label = "Shoot today";
  else if(days === 1) label = "Shoot tomorrow";
  else if(days === -1) label = "Shoot yesterday";
  else if(days > 1) label = `Shoot in ${days} days`;
  else label = `Shoot ${-days} days ago`;
  const level = days < 0 ? "past" : (days <= 3 ? "soon" : (days <= 7 ? "near" : "ok"));
  return { days, label: `${label} (${dateLabel})`, level };
}
// Parse a UK-style date "d/m/yyyy" (or d/m/yy) to "YYYY-MM-DD"; null if unparseable.
function parseUKDate(s){
  if(!s) return null;
  const m = String(s).trim().match(/^(\d{1,2})\s*\/\s*(\d{1,2})\s*\/\s*(\d{2,4})$/);
  if(!m) return null;
  let [_, d, mo, y] = m; d=+d; mo=+mo; y=+y;
  if(y < 100) y += 2000;
  if(mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  return y + "-" + String(mo).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}

/* ============================ Timer ops ============================ */
// Only one timer runs at a time: banking & pausing any other that's currently running.
function pauseOthers(exceptId){
  state.cards.forEach(c => {
    if(c.id !== exceptId && c.timer.st === "running"){
      c.timer.elapsed = timerValue(c.timer); c.timer.startedAt = null; c.timer.st = "paused";
    }
  });
}
let lastTimerId = null;
function startTimer(id){ const t = card(id).timer; if(t.st==="running") return; pauseOthers(id); if(!t.firstStart) t.firstStart = Date.now(); t.st="running"; t.startedAt = Date.now(); lastTimerId = id; save(); render(); }
function pauseTimer(id){ const t = card(id).timer; if(t.st!=="running") return; t.elapsed = timerValue(t); t.startedAt=null; t.st="paused"; save(); render(); }
function resumeTimer(id){ const t = card(id).timer; if(t.st==="running") return; pauseOthers(id); if(!t.firstStart) t.firstStart = Date.now(); t.st="running"; t.startedAt=Date.now(); lastTimerId = id; save(); render(); }
function stopTimer(id){
  const c = card(id), t = c.timer;
  const secs = timerValue(t);
  if(secs >= 1) c.logs.push({ id:"l"+Math.random().toString(36).slice(2,9), seconds: Math.round(secs), start: t.firstStart || Date.now(), end: Date.now(), note: "" });
  c.timer = newTimer();
  save(); render();
}
function stopAllTimers(){
  state.cards.filter(c=>c.timer.st!=="stopped").forEach(c=>stopTimer(c.id));
}
// Confirm before banking a session (so you don't end one by accident).
async function confirmStopTimer(id){
  const c = card(id); if(!c) return;
  const secs = timerValue(c.timer);
  if(await uiConfirm({ title:"Log this time?", message:`Log ${fmtClock(secs)} on “${c.title || "this card"}”?`, okText:"✓ Confirm" })) stopTimer(id);
}
async function confirmStopAll(){
  const n = state.cards.filter(c=>c.timer.st!=="stopped").length;
  if(!n) return;
  if(await uiConfirm({ title:"Log all timers?", message:`Confirm and log all ${n} timer${n===1?"":"s"}?`, okText:"✓ Confirm" })) stopAllTimers();
}
function toggleCardTimer(id, e){
  e && e.stopPropagation();
  const t = card(id).timer;
  if(t.st === "stopped") startTimer(id);
  else if(t.st === "running") pauseTimer(id);
  else resumeTimer(id);
}

        (firstLink ? `<a class="cc-link" href="${esc(firstLink.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="${esc(firstLink.url)}">🔗</a>` : "") +
        (hasTime ? `<span class="${badgeClass} cc-time" data-timebadge="${c.id}">⏱ ${esc(fmtClock(totalSeconds(c)))}</span>` : `<span class="cc-time" data-timebadge="${c.id}"></span>`) +
        `<button class="${playClass} cc-play" title="${t.st==='running'?'Pause':(t.st==='paused'?'Resume':'Start timer')}">${playIcon}</button>` +
      `</div>`;
    el.querySelector(".play-btn").addEventListener("click", e => toggleCardTimer(c.id, e));
    el.addEventListener("click", () => openCardEditor(c.id));
    el.addEventListener("dragstart", e => { el.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
    el.addEventListener("dragend", () => { el.classList.remove("dragging"); commitOrder(); });
    return el;
  }

  const metaHtml = (c.status || si) ? `<div class="card-meta">` +
    (c.status ? `<span class="status-pill">${esc(c.status)}</span>` : "") +
    (si ? `<span class="shoot-badge ${si.level}" data-shoot="${c.id}">🎬 ${esc(si.label)}</span>` : "") +
    `</div>` : "";

  const pathHtml = c.filePath ? `<div class="card-path"><span class="cp-icon">📁</span><span class="cp-text" title="${esc(c.filePath)}">${esc(c.filePath)}</span><button class="cp-copy" title="Copy path to paste in File Explorer">📋</button></div>` : "";
  el.innerHTML =
    `<div class="card-ctrls"><button class="card-edit" title="Edit">✏️</button><button class="card-menu" title="More options">⋯</button></div>` +
    prioBadge +
    (c.image ? `<img class="card-img" src="${esc(c.image)}" alt="" />` : "") +
    `<div class="card-titlerow">`+
      (c.projectNumber ? `<span class="proj-num">${esc(c.projectNumber)}</span>` : "") +
      `<div class="card-title" contenteditable="true" data-ph="Untitled" spellcheck="false">${esc(c.title)}</div>` +
    `</div>` +
    (c.archived ? `<span class="archived-tag">archived</span>` : "") +
    (c.notes ? `<div class="card-notes">${esc(c.notes)}</div>` : "") +
    pathHtml +
    metaHtml +
    (linksHtml ? `<div class="card-links">${linksHtml}</div>` : "") +
    `<div class="card-foot">` +
      `<span class="${badgeClass}" data-timebadge="${c.id}">⏱ ${live}</span>` +
      `<button class="${playClass}" title="${t.st==='running'?'Pause':(t.st==='paused'?'Resume':'Start timer')}">${playIcon}</button>` +
    `</div>`;

  el.querySelector(".play-btn").addEventListener("click", e => toggleCardTimer(c.id, e));
  const cpBtn = el.querySelector(".cp-copy");
  if(cpBtn) cpBtn.addEventListener("click", e => { e.stopPropagation(); copyText(c.filePath); });
  wireCardBase(el, c); wireInlineTitle(el, c); wireCardMenu(el, c);
  return el;
}
// Shared card wiring: drag + double-click-to-open-editor.
function wireCardBase(el, c){
  el.addEventListener("dragstart", e => { el.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
  el.addEventListener("dragend", () => { el.classList.remove("dragging"); el.draggable = true; commitOrder(); });
  el.addEventListener("dblclick", e => {
    if(e.target.isContentEditable || e.target.closest(".card-menu,.play-btn,a,input,button,label")) return;
    openCardEditor(c.id);
  });
}
// Edit the title straight on the card (contenteditable). No modal.
function wireInlineTitle(el, c){
  const t = el.querySelector(".card-title");
  if(!t) return;
  t.addEventListener("mousedown", () => { el.draggable = false; });
  t.addEventListener("blur", () => { el.draggable = true; c.title = t.innerText.trim(); save(); });
  t.addEventListener("input", () => { c.title = t.innerText; save(); });
  t.addEventListener("click", e => e.stopPropagation());
  t.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); t.blur(); } });
}
function wireCardMenu(el, c){
  const m = el.querySelector(".card-menu");
  if(m) m.addEventListener("click", e => { e.stopPropagation(); openCardMenu(e, c.id); });
  const ed = el.querySelector(".card-edit");
  if(ed) ed.addEventListener("click", e => {
    e.stopPropagation();
    if(c.type === "note"){ const b = el.querySelector(".note-edit-body"); if(b) b.focus(); }
    else openCardEditor(c.id);
  });
}

function renderNoteCard(el, c){
  el.classList.add("note-card");
  el.innerHTML =
    `<div class="card-ctrls"><button class="card-edit" title="Edit">✏️</button><button class="card-menu" title="More options">⋯</button></div>` +
    prioBadgeHtml(c) +
    `<div class="note-edit-title" contenteditable="true" data-ph="Title (optional)" spellcheck="false">${esc(c.title)}</div>` +
    `<div class="note-edit-body" contenteditable="true" data-ph="Write a note…" spellcheck="false">${sanitizeHtml(c.notes)}</div>`;
  wireCardMenu(el, c);
  const titleEl = el.querySelector(".note-edit-title");
  const bodyEl = el.querySelector(".note-edit-body");
  // body keeps rich formatting (Ctrl+B / Ctrl+I work natively in the editable text)
  const saveNote = () => { c.title = titleEl.innerText.trim(); c.notes = bodyEl.innerHTML; save(); };
  [titleEl, bodyEl].forEach(ed => {
    ed.addEventListener("mousedown", () => { el.draggable = false; });
    ed.addEventListener("blur", () => { el.draggable = true; saveNote(); });
    ed.addEventListener("input", saveNote);
    ed.addEventListener("click", e => e.stopPropagation());
  });
  // Enter finishes editing (closes it). Title → done; Body → done, Shift+Enter = new line.
  titleEl.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); titleEl.blur(); } });
  bodyEl.addEventListener("keydown", e => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); bodyEl.blur(); } });
  el.addEventListener("dragstart", e => { el.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
  el.addEventListener("dragend", () => { el.classList.remove("dragging"); el.draggable = true; commitOrder(); });
}

function renderChecklistCard(el, c){
  el.classList.add("checklist-card");
  const items = c.items || [];
  const done = items.filter(i=>i.done).length;
  const itemsHtml = items.map(i =>
    `<div class="chk-item ${i.done?'done':''}" data-item="${i.id}" draggable="true">`+
      `<input type="checkbox" class="chk-cb" data-chk="${i.id}" ${i.done?'checked':''} />`+
      `<span class="chk-txt" data-chk="${i.id}">${esc(i.text)}</span>`+
    `</div>`
  ).join("") || `<div class="chk-empty">No items yet.</div>`;
  el.innerHTML =
    `<div class="card-ctrls"><button class="card-edit" title="Edit">✏️</button><button class="card-menu" title="More options">⋯</button></div>` +
    prioBadgeHtml(c) +
    `<div class="card-topline">`+
      `<div class="card-title" contenteditable="true" data-ph="Checklist" spellcheck="false">${esc(c.title)}</div>` +
      `<span class="chk-count">${items.length?done+"/"+items.length:""}</span>` +
    `</div>` +
    (c.archived ? `<span class="archived-tag">archived</span>` : "") +
    `<div class="chk-list">${itemsHtml}</div>` +
    `<div class="chk-add"><input class="chk-add-input" data-chkadd="${c.id}" placeholder="+ add item" spellcheck="false" /></div>`;
  el.querySelectorAll(".chk-cb").forEach(cb => cb.addEventListener("click", e => {
    e.stopPropagation();
    const it = (c.items||[]).find(x=>x.id===cb.dataset.chk); if(it){ it.done = cb.checked; save(); render(); }
  }));
  // click the text toggles done too (kept from the old <label> behaviour)
  el.querySelectorAll(".chk-txt").forEach(sp => sp.addEventListener("click", e => {
    e.stopPropagation();
    const it = (c.items||[]).find(x=>x.id===sp.dataset.chk); if(it){ it.done = !it.done; save(); render(); }
  }));
  // drag items to reorder (no buttons)
  const chkList = el.querySelector(".chk-list");
  el.querySelectorAll(".chk-item").forEach(it => {
    it.addEventListener("dragstart", e => { e.stopPropagation(); draggingChkItem = it.dataset.item; it.classList.add("chk-dragging"); e.dataTransfer.effectAllowed = "move"; });
    it.addEventListener("dragend", e => { e.stopPropagation(); it.classList.remove("chk-dragging"); if(draggingChkItem){ draggingChkItem = null; commitChecklistOrder(c); } });
  });
  if(chkList){
    chkList.addEventListener("dragover", e => {
      if(!draggingChkItem) return;
      e.preventDefault(); e.stopPropagation();
      const dragging = chkList.querySelector(".chk-item.chk-dragging"); if(!dragging) return;
      const after = getChkAfter(chkList, e.clientY);
      if(after == null) chkList.appendChild(dragging); else chkList.insertBefore(dragging, after);
    });
    chkList.addEventListener("drop", e => { if(draggingChkItem){ e.preventDefault(); e.stopPropagation(); } });
  }
  const addInput = el.querySelector(".chk-add-input");
  addInput.addEventListener("click", e => e.stopPropagation());
  const commitItem = (refocus) => {
    const v = addInput.value.trim(); if(!v) return;
    (c.items = c.items || []).push({ id:"i"+Math.random().toString(36).slice(2,9), text:v, done:false });
    addInput.value = "";
    save(); render();
    if(refocus){ const again = document.querySelector(`.chk-add-input[data-chkadd="${c.id}"]`); if(again) again.focus(); }
  };
  addInput.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); commitItem(true); } });
  addInput.addEventListener("blur", () => commitItem(false));  // clicking away also adds it
}

function getDragAfter(list, y){
  const els = [...list.querySelectorAll(".card:not(.dragging)")];
  let closest = { offset: -Infinity, el: null };
  for(const child of els){
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.offset) closest = { offset, el: child };
  }
  return closest.el;
}

// Read the DOM order back into state after a drag
function commitOrder(){
  document.querySelectorAll(".col-cards").forEach(list => {
    const colId = list.dataset.colId;
    [...list.querySelectorAll(".card")].forEach((el, i) => {
      const c = card(el.dataset.cardId);
      if(c){ c.columnId = colId; c.order = i; }
    });
  });
  save();
  render();   // redraw so each card matches its column (compact only in compact columns, full elsewhere)
}

/* ============================ Card factory / quick add / columns ============================ */
function newCard(type, colId, order, extra){
  const base = { id:"c"+Math.random().toString(36).slice(2,9), type: type||"project", title: "", projectNumber: "",
    notes:"", color:null, links:[], image:null, archived:false, logs:[], timer:newTimer(), shootDate:null, status:"", filePath:"", items:[],
    columnId: colId, order: order||0 };
  return Object.assign(base, extra||{});
}
// Create a card of `type` in a column at a given index (used by palette drag + the add menu).
function createCardAt(type, colId, index){
  const c = newCard(type, colId, 0);
  state.cards.push(c);
  const list = cardsIn(colId).filter(x => x.id !== c.id);
  if(index == null || index < 0 || index > list.length) index = list.length;
  list.splice(index, 0, c);
  list.forEach((x,i) => x.order = i);
  save(); render();
  // No modal — just drop the card in and let the user type its name straight on it.
  const sel = type === "note" ? ".note-edit-body" : ".card-title";
  const target = document.querySelector(`[data-card-id="${c.id}"] ${sel}`);
  if(target){ target.focus(); }
}
function quickAddCard(colId){ createCardAt("project", colId, null); }
// Duplicate a card (fresh copy — no time logs, reset checklist ticks). Great for recurring work.
function duplicateCard(id){
  const c = card(id); if(!c) return;
  const copy = JSON.parse(JSON.stringify(c));
  copy.id = "c"+Math.random().toString(36).slice(2,9);
  copy.title = (c.title || "Untitled") + " (copy)";
  copy.logs = [];
  copy.timer = newTimer();
  copy.archived = false;
  if(Array.isArray(copy.items)) copy.items = copy.items.map(i => ({ id:"i"+Math.random().toString(36).slice(2,9), text:i.text, done:false }));
  state.cards.push(copy);
  // place the copy directly after the original within its column
  const list = cardsIn(c.columnId);
  const at = list.findIndex(x => x.id === c.id);
  list.splice(list.indexOf(copy), 1);
  list.splice(at + 1, 0, copy);
  list.forEach((x,i) => x.order = i);
  save(); render();
  if(copy.type === "note"){ const b = document.querySelector(`[data-card-id="${copy.id}"] .note-edit-body`); if(b) b.focus(); }
  else openCardEditor(copy.id, true);
}
